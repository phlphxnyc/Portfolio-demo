function LineChart({data,height=220}){
  const [hover,setHover]=useState(null);
  if(!data||data.length<2)return null;
  const w=680,h=height,pad={t:15,r:15,b:25,l:60};
  const iw=w-pad.l-pad.r,ih=h-pad.t-pad.b;
  const yMin=Math.min(...data.map(d=>d.hh))*.97,yMax=Math.max(...data.map(d=>d.hh))*1.03;
  const xMin=data[0].ts,xMax=data[data.length-1].ts;
  const sx=v=>pad.l+((v-xMin)/(xMax-xMin))*iw;
  const sy=v=>pad.t+ih-((v-yMin)/(yMax-yMin))*ih;
  const pts=data.map(d=>sx(d.ts)+","+sy(d.hh)).join(" L");
  const area="M"+pts+"L"+sx(xMax)+","+sy(yMin)+"L"+sx(xMin)+","+sy(yMin)+"Z";
  const yT=Array.from({length:4},(_,i)=>yMin+(yMax-yMin)*(i/3));
  const hd=hover!==null&&hover<data.length?data[hover]:null;
  const hM=e=>{const r=e.currentTarget.getBoundingClientRect();const x=(e.clientX-r.left)/r.width*w;setHover(Math.round(Math.max(0,Math.min(1,(x-pad.l)/iw))*(data.length-1)))};
  return <div><svg width="100%" height={h} viewBox={"0 0 "+w+" "+h} style={{display:"block",cursor:"crosshair"}} onMouseMove={hM} onMouseLeave={()=>setHover(null)}>
    {yT.map((v,i)=><g key={i}><line x1={pad.l} x2={w-pad.r} y1={sy(v)} y2={sy(v)} stroke="#151d2e" strokeWidth={.5}/><text x={pad.l-6} y={sy(v)+4} fill="#3a4a5e" fontSize={8} textAnchor="end">{fmt(v)}</text></g>)}
    <path d={area} fill="#00e5ff" opacity={.06}/><path d={"M"+pts} fill="none" stroke="#00e5ff" strokeWidth={2}/>
    {hd&&<g><line x1={sx(hd.ts)} x2={sx(hd.ts)} y1={pad.t} y2={h-pad.b} stroke="#00e5ff" strokeWidth={1} opacity={.5} strokeDasharray="3,3"/><circle cx={sx(hd.ts)} cy={sy(hd.hh)} r={4} fill="#00e5ff" stroke="#06080f" strokeWidth={2}/></g>}
  </svg>
  {hd&&<div style={{background:"#111825",border:"1px solid #182038",borderRadius:4,padding:"6px 12px",marginTop:2,display:"flex",gap:16,fontSize:10}}>
    <span style={{color:"#00e5ff",fontWeight:700}}>{new Date(hd.ts).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>
    <span>Household: <b style={{color:"#00e5ff"}}>{fmtF(hd.hh)}</b></span>
    <span style={{color:hd.hh>=data[0].hh?"#4caf50":"#ef5350"}}>{hd.hh>=data[0].hh?"+":""}{fmtF(hd.hh-data[0].hh)} ({pct((hd.hh-data[0].hh)/data[0].hh)})</span>
  </div>}</div>;
}

{tab==="journal"&&(<div>
  <div style={{display:"flex",gap:6,marginBottom:10}}><button onClick={()=>setJournalView("trades")} style={btn(journalView==="trades")}>TRADES ({TRADES.length})</button><button onClick={()=>setJournalView("insights")} style={btn(journalView==="insights")}>INSIGHTS ({INSIGHTS.length})</button></div>
  {journalView==="trades"&&TRADES.map(t=>{const isExp=expandTrade===t.id;return <div key={t.id} onClick={()=>setExpandTrade(isExp?null:t.id)} style={{background:isExp?"#111825":"#0e1525",border:"1px solid #182038",borderLeft:"3px solid "+(t.action.includes("BUY")?"#4caf50":"#ef5350"),borderRadius:"0 6px 6px 0",padding:"9px 12px",marginBottom:3,cursor:"pointer"}}>
    <div style={{display:"flex",justifyContent:"space-between"}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{color:"#3a4a5e",fontSize:10}}>{t.date}</span><span style={{background:t.action.includes("BUY")?"#4caf5033":"#ef535033",color:t.action.includes("BUY")?"#4caf50":"#ef5350",padding:"2px 6px",borderRadius:3,fontSize:9,fontWeight:700}}>{t.action}</span><span style={{fontWeight:800,fontSize:12}}>{t.symbol}</span><span style={{color:"#5c6b7a"}}>{t.qty} @ ${t.price}</span></div><span style={{background:t.status==="OPEN"?"#4caf5033":"#3a4a5e33",color:t.status==="OPEN"?"#4caf50":"#3a4a5e",padding:"2px 6px",borderRadius:3,fontSize:8,fontWeight:700}}>{t.status}</span></div>
    <div style={{color:"#5c6b7a",fontSize:10,marginTop:3}}>{t.thesis}</div>
    {isExp&&<div style={{marginTop:8,paddingTop:8,borderTop:"1px solid #182038"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,fontSize:10,marginBottom:8}}><div><div style={{color:"#00e5ff",fontSize:9,fontWeight:700,marginBottom:2}}>STRATEGY</div>{t.strategy||"—"}</div><div><div style={{color:"#ff9100",fontSize:9,fontWeight:700,marginBottom:2}}>EXIT PLAN</div>{t.exitPlan||"—"}</div></div>
      {t.comments&&t.comments.length>0&&<div><div style={{color:"#7c4dff",fontSize:9,fontWeight:700,letterSpacing:1,marginBottom:4}}>COMMENTS</div>{t.comments.map((c,ci)=><div key={ci} style={{color:"#c8d0dc",fontSize:10,padding:"3px 0",borderBottom:"1px solid #111a28"}}>{c}</div>)}</div>}
    </div>}
  </div>})}
  {journalView==="insights"&&INSIGHTS.map(ins=>{const isExp=expandInsight===ins.id;return <div key={ins.id} onClick={()=>setExpandInsight(isExp?null:ins.id)} style={{background:isExp?"#111825":"#0e1525",border:"1px solid #182038",borderLeft:"3px solid "+(insC[ins.type]||"#3a4a5e"),borderRadius:"0 6px 6px 0",padding:"9px 12px",marginBottom:3,cursor:"pointer"}}>
    <div style={{display:"flex",justifyContent:"space-between"}}><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{color:"#3a4a5e",fontSize:10}}>{ins.date}</span><span style={{background:(insC[ins.type]||"#3a4a5e")+"33",color:insC[ins.type],padding:"2px 6px",borderRadius:3,fontSize:9,fontWeight:700}}>{ins.type}</span><span style={{fontWeight:700}}>{ins.symbols}</span></div><span style={{background:(priC[ins.priority]||"#3a4a5e")+"33",color:priC[ins.priority],padding:"2px 6px",borderRadius:3,fontSize:8,fontWeight:700}}>{ins.priority}</span></div>
    <div style={{color:"#c8d0dc",fontSize:11,marginTop:3}}>{ins.text}</div>
    {isExp&&ins.action&&<div style={{marginTop:6,paddingTop:6,borderTop:"1px solid #182038"}}><div style={{color:"#ff9100",fontSize:9,fontWeight:700,marginBottom:2}}>ACTION</div><div style={{fontSize:11}}>{ins.action}</div></div>}
  </div>})}
</div>)}

{/* PERFORMANCE */}
{tab==="performance"&&(<div>
  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>{[["Invested",fmtF(totalBasis),"#3a4a5e"],["Current",fmtF(totalMV),"#00e5ff"],["P&L",(totalMV>=totalBasis?"+":"")+fmtF(totalMV-totalBasis),totalMV>=totalBasis?"#4caf50":"#ef5350"],["Return",pct((totalMV-totalBasis)/totalBasis),totalMV>=totalBasis?"#4caf50":"#ef5350"]].map((c,i)=><div key={i} style={{background:"#0e1525",border:"1px solid #182038",borderRadius:8,padding:"14px 18px",textAlign:"center"}}><div style={{color:"#3a4a5e",fontSize:9,marginBottom:4}}>{c[0]}</div><div style={{fontSize:20,fontWeight:800,color:c[2]}}>{c[1]}</div></div>)}</div>
  <div style={{fontSize:10,color:"#3a4a5e",fontWeight:700,marginBottom:6}}>P&L BY POSITION</div>
  {consolidated.map(c=>{const pl=c.mv-c.basis;const pp=c.basis>0?pl/c.basis:0;return <div key={c.name} style={{display:"flex",alignItems:"center",gap:10,marginBottom:3}}><span style={{width:55,fontSize:11,fontWeight:700,textAlign:"right"}}>{c.name}</span><div style={{flex:1,height:20,background:"#111825",borderRadius:4,position:"relative",overflow:"hidden"}}><div style={{width:Math.min(100,Math.abs(pp)*100)+"%",height:"100%",background:pl>=0?"#4caf50":"#ef5350",borderRadius:4,opacity:.6}}/><span style={{position:"absolute",left:6,top:3,fontSize:9,fontWeight:700,color:"#fff"}}>{pl>=0?"+":""}{fmt(Math.abs(pl))} ({pp>=0?"+":""}{pct(pp)})</span></div></div>})}
</div>)}

{/* AI CHAT */}
{tab==="chat"&&(<div>
  <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:8}}>AI STRATEGY ASSISTANT</div>
  <div style={{background:"#0c1019",border:"1px solid #151d2e",borderRadius:8,padding:16,height:400,overflowY:"auto",marginBottom:10}}>
    {chatMsgs.map((m,i)=><div key={i} style={{marginBottom:10,display:"flex",flexDirection:"column",alignItems:m.role==="user"?"flex-end":"flex-start"}}>
      <div style={{background:m.role==="user"?"#00e5ff15":"#111825",border:"1px solid "+(m.role==="user"?"#00e5ff33":"#182038"),borderRadius:8,padding:"10px 14px",maxWidth:"80%",fontSize:11,lineHeight:1.5,color:"#c8d0dc"}}>{m.text}</div>
      <div style={{fontSize:8,color:"#3a4a5e",marginTop:2}}>{m.role==="user"?"You":"AI Strategist"}</div>
    </div>)}
  </div>
  <div style={{display:"flex",gap:8}}><input value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")sendChat()}} style={{...inputSt,flex:1}} placeholder="Ask about your portfolio, risk, or strategy..."/><button onClick={sendChat} style={{...btn(true),padding:"8px 20px"}}>SEND</button></div>
</div>)}

      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
