// ═══ SVG CHART COMPONENTS ═══
function SimplePie({data, dataKey, size=220, inner=40, outer=85}) {
  const total = data.reduce((s,d) => s + (d[dataKey]||0), 0);
  if (total === 0) return null;
  const cx = size/2, cy = size/2;
  let cum = -Math.PI/2;
  const slices = data.map((d,i) => {
    const val = d[dataKey]||0;
    const ang = (val/total) * Math.PI * 2;
    const s = cum; cum += ang; const e = cum;
    const x1=cx+outer*Math.cos(s), y1=cy+outer*Math.sin(s);
    const x2=cx+outer*Math.cos(e), y2=cy+outer*Math.sin(e);
    const x3=cx+inner*Math.cos(e), y3=cy+inner*Math.sin(e);
    const x4=cx+inner*Math.cos(s), y4=cy+inner*Math.sin(s);
    const lg = ang > Math.PI ? 1 : 0;
    const path = `M${x1},${y1} A${outer},${outer} 0 ${lg},1 ${x2},${y2} L${x3},${y3} A${inner},${inner} 0 ${lg},0 ${x4},${y4} Z`;
    return <path key={i} d={path} fill={d.color||`hsl(${i*37},65%,50%)`} stroke="#080c14" strokeWidth={1}>
      <title>{d.name}: {fmtF(val)} | {pct(val/total)} of view</title>
    </path>;
  });
  return <svg width={size} height={size} style={{display:"block",margin:"0 auto"}}>{slices}</svg>;
}

function SimpleBar({data, dataKey, nameKey, height=340}) {
  const maxVal = Math.max(...data.map(d=>d[dataKey]||0));
  if (maxVal === 0) return null;
  const bH = 22, w = 420, lW = 120;
  const totalH = data.length * (bH + 4);
  return <svg width="100%" height={totalH} viewBox={`0 0 ${w} ${totalH}`} style={{display:"block"}}>
    {data.map((d,i) => {
      const val = d[dataKey]||0;
      const bW = (val/maxVal) * (w - lW - 60);
      const y = i * (bH + 4);
      return <g key={i}>
        <text x={lW-8} y={y+bH/2+4} fill="#c8d0dc" fontSize={10} textAnchor="end" fontFamily="inherit">{(d[nameKey]||d.name||"").substring(0,16)}</text>
        <rect x={lW} y={y+2} width={Math.max(2,bW)} height={bH-4} rx={3} fill={d.color||`hsl(${i*37},65%,50%)`} />
        <text x={lW+bW+6} y={y+bH/2+4} fill="#5c6b7a" fontSize={9} fontFamily="inherit">{fmt(val)}</text>
      </g>;
    })}
  </svg>;
}

// ═══ ACCOUNT TAX CHARACTERISTICS ═══
const ACCT_TAX = {
  "Brokerage": {type:"Taxable",friction:"High",taxType:"Taxable"},
  "IRA": {type:"Traditional IRA",friction:"None",taxType:"Tax-Deferred"},
  "401k": {type:"401k",friction:"None",taxType:"Tax-Deferred"},
  "Crypto": {type:"Taxable",friction:"High",taxType:"Taxable"},
};

function getRebalanceInsights(positions, factorExp, consolidated, totalH) {
  const insights = [];
  
  // 1. WINNERS IN TAX-FREE — trim freely
  positions.filter(p => {
    const tax = ACCT_TAX[p.acct];
    return tax && tax.friction === "None" && p.basis > 0 && (p.mv-p.basis)/p.basis > 0.20 && p.mv > 2000;
  }).forEach(p => {
    const gainPct = ((p.mv-p.basis)/p.basis*100).toFixed(0);
    insights.push({type:"trim-free",severity:gainPct>100?"high":"medium",symbol:p.id,account:p.acct,
      msg:`${p.id} is +${gainPct}% (${fmt(p.mv-p.basis)}) in ${p.acct} — trim with ZERO tax cost`,
      action:`Rotate into underweight factors. No tax friction in ${ACCT_TAX[p.acct].taxType} account.`,mv:p.mv});
  });

  // 2. LOSERS IN TAXABLE — harvest
  positions.filter(p => p.acct==="Taxable" && p.basis>0 && (p.mv-p.basis)<-1000).forEach(p => {
    const loss = p.basis-p.mv;
    const lossPct = ((p.mv-p.basis)/p.basis*100).toFixed(0);
    const baseName = p.id.split("-")[0];
    const otherAccts = positions.filter(op => op.id.startsWith(baseName) && op.acct!=="Taxable").map(op=>op.acct);
    insights.push({type:"harvest",severity:loss>10000?"high":"medium",symbol:p.id,account:"Taxable",
      msg:`${p.id}: ${lossPct}% loss (${fmt(loss)} harvestable) in Taxable`,
      action:otherAccts.length>0
        ? `WASH SALE RISK: Also held in ${otherAccts.join(", ")}. Cannot buy in ANY account for 30 days after selling.`
        : `Clean harvest — not held in other accounts. Sell and re-enter after 31 days or buy correlated substitute.`,mv:p.mv});
  });

  // 3. CONCENTRATION
  consolidated.filter(c => c.mv/totalH > 0.08).forEach(c => {
    const taxFree = c.positions.filter(p => ACCT_TAX[p.acct]?.friction==="None");
    const taxable = c.positions.filter(p => ACCT_TAX[p.acct]?.friction==="High");
    if (taxFree.length > 0) {
      const tfMV = taxFree.reduce((s,p)=>s+p.mv,0);
      insights.push({type:"rebalance",severity:c.mv/totalH>0.15?"high":"medium",symbol:c.name,account:"Multi",
        msg:`${c.name}: ${pct(c.mv/totalH)} of HH across ${c.accounts.size} accounts`,
        action:`${fmt(tfMV)} in tax-free accounts — trim there first.${taxable.length>0?" Taxable portion has tax friction.":""}`,mv:c.mv});
    }
  });

  // 4. CROSS-ACCOUNT SAME SECURITY
  const byBase = {};
  positions.forEach(p => { const b=p.id.split("-")[0]; if(!byBase[b])byBase[b]=[]; byBase[b].push(p); });
  Object.entries(byBase).forEach(([base,pList]) => {
    if(pList.length<2) return;
    const taxable=pList.filter(p=>ACCT_TAX[p.acct]?.friction==="High");
    const taxFree=pList.filter(p=>ACCT_TAX[p.acct]?.friction==="None");
    if(taxable.length>0 && taxFree.length>0) {
      const taxMV=taxable.reduce((s,p)=>s+p.mv,0);
      const freeMV=taxFree.reduce((s,p)=>s+p.mv,0);
      const taxPL=taxable.reduce((s,p)=>s+(p.mv-p.basis),0);
      insights.push({type:"cross-account",severity:"info",symbol:base,account:"Cross",
        msg:`${base}: ${fmt(taxMV)} taxable + ${fmt(freeMV)} tax-free`,
        action:taxPL<0
          ? `Taxable underwater — harvest candidate. Keep tax-free positions. Watch 30-day wash sale.`
          : `Taxable has gains — rebalance in tax-free accounts first.`,mv:taxMV+freeMV});
    }
  });

  // 5. HSA OPTIMIZATION
  const hsaP = positions.filter(p=>p.acct==="IRA");
  const hsaMV = hsaP.reduce((s,p)=>s+p.mv,0) + (DEFAULT_CASH.find(c=>c.acct==="IRA")?.amt||0);
  if(hsaMV>5000) {
    insights.push({type:"optimize",severity:"info",symbol:"HSA",account:"IRA",
      msg:`HSA (${fmt(hsaMV)}) — triple-tax-free, best for highest-conviction growth`,
      action:`Currently: ${hsaP.map(p=>p.id).join(", ")}. Consider highest-growth here. Every dollar of gain is permanently tax-free.`,mv:hsaMV});
  }

  // 6. INHERITED IRA
  const inhP = positions.filter(p=>p.acct==="IRA");
  if(inhP.length>0) {
    insights.push({type:"optimize",severity:"info",symbol:"Inherited IRA",account:"IRA",
      msg:`Inherited IRA (${fmt(inhP.reduce((s,p)=>s+p.mv,0))}) has RMD requirements`,
      action:`Plan distributions. Sell losers before distribution year. RMDs are taxable income.`,mv:inhP.reduce((s,p)=>s+p.mv,0)});
  }

  // 7. CARRIED LOSSES
  insights.push({type:"tax-asset",severity:"high",symbol:"Carried Losses",account:"Taxable",
    msg:`~$125K carried losses — deploy against GOOGL trim`,
    action:`GOOGL $305K to ~$100K = ~$180K gain. Carried losses offset $125K, leaving ~$55K taxable. Trim LT lots first (lower rate). Consider spreading across 2 tax years.`,mv:125000});

  return insights.sort((a,b) => ({high:0,medium:1,info:2}[a.severity]||3) - ({high:0,medium:1,info:2}[b.severity]||3));
}

function tryParseJSON(str, fallback) {
  if (!str || typeof str !== 'string') return fallback;
  let cleaned = str.trim();
  if (cleaned.startsWith('"') && cleaned.endsWith('"')) {
    cleaned = cleaned.slice(1, -1);
  }
  cleaned = cleaned.replace(/""/g, '"');
  try { return JSON.parse(cleaned); } catch(e) {
    // Google Sheets exports unquoted keys like {AI/ML:0.7}
    // Convert to valid JSON by quoting keys
    try {
      const fixed = cleaned.replace(/([{,])\s*([^{},:"]+?)\s*:/g, '$1"$2":');
      return JSON.parse(fixed);
    } catch(e2) {
      return fallback;
    }
  }
}

// Apply live prices to positions
function applyPrices(positions, priceMap) {
  const tickerMap = {
    'GOOGL':'GOOGL','QXO':'QXO','OPEN':'OPEN','COIN':'COIN',
    'GLXY':'GLXY',
    'IBIT':'IBIT','ZETA':'ZETA','GLD':'GLD','NVDA':'NVDA',
    'B':'GOLD','BRK':'BRK-B','HOOD':'HOOD',
    'VINIX':'VINIX','BTC':'BTCUSD','ETH':'ETHUSD','SOL':'SOLUSD',
  };
  
  return positions.map(p => {
    const base = p.id.split('-')[0];
    const ticker = tickerMap[p.id] || tickerMap[base] || base;
    const quote = priceMap[ticker] || priceMap[p.id] || priceMap[base];
    if (!quote || !quote.price) return p;
    
    // Don't update options/warrants with stock price (they have their own pricing)
    if (p.type === 'Option' || p.type === 'Warrant') {
      return { ...p, dailyChange: quote.change, dailyChangePct: quote.changePct, prevClose: quote.prevClose, high52: quote.high52, low52: quote.low52 };
    }
    
    const newPrice = quote.price;
    const newMV = p.type === 'Crypto' ? newPrice * p.qty : newPrice * p.qty;
    return {
      ...p,
      price: newPrice,
      mv: newMV,
      dailyChange: quote.change,
      dailyChangePct: quote.changePct,
      prevClose: quote.prevClose,
      high52: quote.high52,
      low52: quote.low52,
    };
  });
}

const genHistory = () => {
  const start = new Date("2025-06-01"), end = new Date("2026-03-17");
  const days = Math.floor((end - start) / 864e5);
  const data = [];
  const accts = {"Brokerage":600000,"IRA":200000,,"Crypto":170000};
  const fcts = {"Bitcoin/Crypto":240000,"AI/ML":350000,"Rollup/M&A":100000,"PropTech/RE":70000,"Gold/Inflation":50000,"Index/Passive":280000};
  for(let i=0;i<=days;i++){
    const d=new Date(start);d.setDate(d.getDate()+i);
    if(d.getDay()===0||d.getDay()===6) continue;
    const n=()=>(Math.random()-.48)*.015;
    const cn=()=>(Math.random()-.45)*.035;
    Object.keys(accts).forEach(k=>{if(k==="SKIP")return;if(k==="Crypto")accts[k]*=(1+cn());else accts[k]*=(1+n())});
    Object.keys(fcts).forEach(k=>{if(k==="Bitcoin/Crypto")fcts[k]*=(1+cn());else fcts[k]*=(1+n())});
    const hh=Object.values(accts).reduce((s,v)=>s+v,0);
    data.push({date:d.toISOString().split("T")[0],ts:d.getTime(),household:Math.round(hh),
      taxable:Math.round(accts["Taxable"]+accts["Crypto"]),
      jeffRet:Math.round(accts["IRA"]+accts["IRA"]+accts["IRA"]+accts["IRA"]+accts["IRA"]),
      jessRet:Math.round(accts["401k"]+accts["401k"]+accts["401k"]),
      accounts:{...accts},factors:{...fcts}});
  }
  if(data.length>0){const l=data[data.length-1];l.household=2284000;}
  return data;
};

  const allVals=lines.flatMap(l=>data.map(d=>d[l.key]||(l.acc?l.acc(d):0)));
  const yMin=Math.min(...allVals)*.97,yMax=Math.max(...allVals)*1.03;
  const xMin=data[0].ts,xMax=data[data.length-1].ts;
  const sx=v=>pad.l+((v-xMin)/(xMax-xMin))*iw;
  const sy=v=>pad.t+ih-((v-yMin)/(yMax-yMin))*ih;
  const paths=lines.map(l=>{const pts=data.map(d=>{const v=d[l.key]||(l.acc?l.acc(d):0);return sx(d.ts)+","+sy(v)}).join(" L");return{...l,d:"M"+pts}});
  const yTicks=Array.from({length:5},(_,i)=>yMin+(yMax-yMin)*(i/4));
  const xTicks=Array.from({length:6},(_,i)=>xMin+(xMax-xMin)*(i/5));
  
  const handleMouse=(e)=>{
    const svg=e.currentTarget;
    const rect=svg.getBoundingClientRect();
    const x=(e.clientX-rect.left)/rect.width*w;
    if(x<pad.l||x>w-pad.r){setHover(null);return;}
    const ratio=(x-pad.l)/iw;
    const idx=Math.round(ratio*(data.length-1));
    if(idx>=0&&idx<data.length)setHover(idx);
  };
  
  const handleClick=(e)=>{
    if(hover!==null){
      setClicked(hover);
      if(onClickDate)onClickDate(data[hover]);
    }
  };
  
  const hd=hover!==null?data[hover]:null;
  const cd=clicked!==null&&clicked<data.length?data[clicked]:null;
  
  return <div>
    <svg width="100%" height={h} viewBox={"0 0 "+w+" "+h} style={{display:"block",cursor:"crosshair"}} onMouseMove={handleMouse} onMouseLeave={()=>setHover(null)} onClick={handleClick}>
      {yTicks.map((v,i)=><g key={i}><line x1={pad.l} x2={w-pad.r} y1={sy(v)} y2={sy(v)} stroke="#151d2e" strokeWidth={.5}/><text x={pad.l-8} y={sy(v)+4} fill="#3a4a5e" fontSize={9} textAnchor="end" fontFamily="inherit">{fmtF(v)}</text></g>)}
      {xTicks.map((v,i)=>{const d=new Date(v);return <text key={i} x={sx(v)} y={h-6} fill="#3a4a5e" fontSize={9} textAnchor="middle" fontFamily="inherit">{d.toLocaleDateString("en-US",{month:"short",year:"2-digit"})}</text>})}
      {paths.map((p,i)=><path key={i} d={p.d} fill="none" stroke={p.color} strokeWidth={p.width||2} opacity={p.opacity||1}/>)}
      {lines.map((l,i)=><g key={i} transform={"translate("+(pad.l+i*120)+","+(h-28)+")"}><rect width={10} height={3} fill={l.color} rx={1} y={-2}/><text x={14} y={2} fill="#c8d0dc" fontSize={9} fontFamily="inherit">{l.label}</text></g>)}
      {hd&&<g>
        <line x1={sx(hd.ts)} x2={sx(hd.ts)} y1={pad.t} y2={h-pad.b} stroke="#00e5ff" strokeWidth={1} opacity={.5} strokeDasharray="3,3"/>
        {lines.map((l,i)=>{const v=hd[l.key]||(l.acc?l.acc(hd):0);return <circle key={i} cx={sx(hd.ts)} cy={sy(v)} r={4} fill={l.color} stroke="#06080f" strokeWidth={2}/>})}
      </g>}
      {cd&&<line x1={sx(cd.ts)} x2={sx(cd.ts)} y1={pad.t} y2={h-pad.b} stroke="#ff9100" strokeWidth={1.5} opacity={.7}/>}
    </svg>
    {hd&&<div style={{background:"#111825",border:"1px solid #182038",borderRadius:6,padding:"8px 14px",marginTop:4,display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
      <span style={{color:"#00e5ff",fontSize:11,fontWeight:700}}>{new Date(hd.ts).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>
      {lines.map((l,i)=>{const v=hd[l.key]||(l.acc?l.acc(hd):0);const start=data[0][l.key]||(l.acc?l.acc(data[0]):0);const chg=start>0?(v-start)/start:0;return <span key={i} style={{display:"flex",alignItems:"center",gap:4}}>
        <span style={{width:8,height:3,borderRadius:1,background:l.color}}/>
        <span style={{color:"#c8d0dc",fontSize:10}}>{l.label}:</span>
        <span style={{color:"#00e5ff",fontSize:11,fontWeight:700}}>{fmtF(v)}</span>
        <span style={{color:chg>=0?"#4caf50":"#ef5350",fontSize:9}}>({chg>=0?"+":""}{(chg*100).toFixed(1)}%)</span>
      </span>})}
    </div>}
  </div>;
}

function BarChartH({data,height=220}){

  const w=680,h=Math.max(height,data.length*32+30),p={t:10,r:20,b:10,l:110};

}

function HeatMapChart({rows,cols,getData,colorMap}){
  const w=700,p={t:10,r:10,b:10,l:110};
  const cellW=(w-p.l-p.r)/cols.length;
  const cellH=28;
  const totalH=rows.length*cellH+p.t+p.b+20;
  const allV=rows.flatMap(r=>cols.map(c=>getData(r,c)));
  const maxV=Math.max(...allV.map(Math.abs),.01);
  return <svg width="100%" height={totalH} viewBox={"0 0 "+w+" "+totalH} style={{display:"block"}}>
    {cols.map((c,ci)=><text key={ci} x={p.l+ci*cellW+cellW/2} y={p.t+8} fill="#5c6b7a" fontSize={8} textAnchor="middle" fontFamily="inherit" transform={"rotate(-25,"+(p.l+ci*cellW+cellW/2)+","+(p.t+8)+")"}>{c.length>12?c.split("/")[0]:c}</text>)}
    {rows.map((r,ri)=>{const y=p.t+20+ri*cellH;return <g key={ri}>
      <text x={p.l-8} y={y+cellH/2+4} fill="#c8d0dc" fontSize={9} textAnchor="end" fontFamily="inherit">{r}</text>
      {cols.map((c,ci)=>{const v=getData(r,c);const intensity=Math.min(1,Math.abs(v)/maxV);const bg=v===0?"#111825":v>0?"rgba(76,175,80,"+(intensity*.8)+")":"rgba(239,83,80,"+(intensity*.8)+")";
        return <g key={ci}><rect x={p.l+ci*cellW+1} y={y+1} width={cellW-2} height={cellH-2} rx={3} fill={bg}/>
          {cellW>40&&<text x={p.l+ci*cellW+cellW/2} y={y+cellH/2+4} fill="#c8d0dc" fontSize={8} textAnchor="middle" fontFamily="inherit">{v>0?"+"+(v*100).toFixed(0)+"%":v<0?(v*100).toFixed(0)+"%":"--"}</text>}
        </g>})}
    </g>})}
  </svg>;
}

function ScatterChart({data,height=300}){
  if(!data||!data.length)return null;
  const w=700,h=height,p={t:20,r:30,b:40,l:60};
  const iw=w-p.l-p.r,ih=h-p.t-p.b;
  const xVals=data.map(d=>d.x),yVals=data.map(d=>d.y);
  const xMin=Math.min(...xVals)*1.1,xMax=Math.max(...xVals)*1.1;
  const yMin=Math.min(...yVals,0)*1.2,yMax=Math.max(...yVals)*1.2;
  const sx=v=>p.l+((v-xMin)/(xMax-xMin||1))*iw;
  const sy=v=>p.t+ih-((v-yMin)/(yMax-yMin||1))*ih;
  const maxSize=Math.max(...data.map(d=>d.size),1);
  return <svg width="100%" height={h} viewBox={"0 0 "+w+" "+h} style={{display:"block"}}>
    <line x1={p.l} x2={w-p.r} y1={sy(0)} y2={sy(0)} stroke="#2a3a4e" strokeWidth={.5} strokeDasharray="4,4"/>
    <text x={w/2} y={h-6} fill="#3a4a5e" fontSize={9} textAnchor="middle" fontFamily="inherit">Risk (Volatility Proxy)</text>
    <text x={14} y={h/2} fill="#3a4a5e" fontSize={9} textAnchor="middle" fontFamily="inherit" transform={"rotate(-90,14,"+h/2+")"}>Return %</text>
    {data.map((d,i)=>{const r=Math.max(6,Math.sqrt(d.size/maxSize)*25);return <g key={i}>
      <circle cx={sx(d.x)} cy={sy(d.y)} r={r} fill={d.color} opacity={.7} stroke={d.color} strokeWidth={1}/>
      <text x={sx(d.x)} y={sy(d.y)-r-4} fill="#c8d0dc" fontSize={9} textAnchor="middle" fontFamily="inherit">{d.name}</text>
    </g>})}
  </svg>;
}

            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
              <div><div style={{color:"#3a4a5e",fontSize:9,marginBottom:4}}>EXIT PLAN</div><textarea value={newTrade.exitPlan} onChange={e=>setNewTrade({...newTrade,exitPlan:e.target.value})} style={{...inputSt,height:50,resize:"vertical"}} placeholder="Trim 25% at $30..."/></div>
              <div><div style={{color:"#3a4a5e",fontSize:9,marginBottom:4}}>RE-ENTRY CRITERIA</div><textarea value={newTrade.reentry} onChange={e=>setNewTrade({...newTrade,reentry:e.target.value})} style={{...inputSt,height:50,resize:"vertical"}} placeholder="If drops below $18..."/></div>
              <div><div style={{color:"#3a4a5e",fontSize:9,marginBottom:4}}>TAGS (comma sep)</div><input value={newTrade.tags} onChange={e=>setNewTrade({...newTrade,tags:e.target.value})} style={inputSt} placeholder="Rollup/M&A, Conviction"/></div>
            </div>
            <button onClick={addTrade} style={{...btnSt(true),padding:"8px 24px",fontSize:11}}>LOG TRADE</button>
          </div>)}
          {journalView==="trades" && trades.map(t=>{const isExp=expandedTrade===t.id;return(
            <div key={t.id} onClick={()=>setExpandedTrade(isExp?null:t.id)} style={{background:isExp?"#111825":"#0e1525",border:"1px solid #182038",borderLeft:"3px solid "+(t.action.includes("BUY")?"#4caf50":"#ef5350"),borderRadius:"0 6px 6px 0",padding:"12px 16px",marginBottom:6,cursor:"pointer"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <span style={{color:"#3a4a5e",fontSize:10}}>{t.date}</span>
                  <span style={{background:t.action.includes("BUY")?"#4caf5033":"#ef535033",color:t.action.includes("BUY")?"#4caf50":"#ef5350",padding:"2px 8px",borderRadius:3,fontSize:9,fontWeight:700}}>{t.action}</span>
                  <span style={{fontWeight:800,color:"#c8d0dc",fontSize:14}}>{t.symbol}</span>
                  <span style={{color:"#5c6b7a"}}>{t.qty} @ ${t.price}</span>
                  <span style={{color:"#3a4a5e",fontSize:10}}>{t.account}</span>
                </div>
                <div style={{display:"flex",gap:4}}>
                  <span style={{background:t.status==="OPEN"?"#4caf5033":"#3a4a5e33",color:t.status==="OPEN"?"#4caf50":"#3a4a5e",padding:"2px 6px",borderRadius:3,fontSize:8,fontWeight:700}}>{t.status}</span>
                  {(t.tags||[]).map(tag=><span key={tag} style={{background:"#1a274433",color:"#5c6b7a",padding:"2px 6px",borderRadius:3,fontSize:8}}>{tag}</span>)}
                </div>
              </div>
              <div style={{color:"#5c6b7a",fontSize:10,marginTop:4}}>{t.thesis}</div>
              {isExp && (<div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #182038"}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16,fontSize:10}}>
                  <div><div style={{color:"#00e5ff",fontSize:9,letterSpacing:1,marginBottom:4,fontWeight:700}}>STRATEGY</div><div style={{color:"#c8d0dc",lineHeight:1.5}}>{t.strategy||"—"}</div></div>
                  <div><div style={{color:"#ff9100",fontSize:9,letterSpacing:1,marginBottom:4,fontWeight:700}}>EXIT PLAN</div><div style={{color:"#c8d0dc",lineHeight:1.5}}>{t.exitPlan||"—"}</div></div>
                  <div><div style={{color:"#4caf50",fontSize:9,letterSpacing:1,marginBottom:4,fontWeight:700}}>RE-ENTRY</div><div style={{color:"#c8d0dc",lineHeight:1.5}}>{t.reentry||"—"}</div></div>
                </div>
              </div>)}
            </div>
          )})}
        
          {journalView==="insights" && showInsightForm && (<div style={{background:"#0e1525",border:"1px solid #7c4dff33",borderRadius:8,padding:20,marginBottom:16}}>
            <div style={{fontSize:10,color:"#7c4dff",letterSpacing:1,fontWeight:700,marginBottom:12}}>LOG INSIGHT</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:12}}>
              <div><div style={{color:"#3a4a5e",fontSize:9,marginBottom:4}}>DATE</div><input type="date" value={newInsight.date} onChange={e=>setNewInsight({...newInsight,date:e.target.value})} style={inputSt}/></div>
              <div><div style={{color:"#3a4a5e",fontSize:9,marginBottom:4}}>TYPE</div><select value={newInsight.type} onChange={e=>setNewInsight({...newInsight,type:e.target.value})} style={inputSt}><option>Epiphany</option><option>Thesis Change</option><option>Fundamental Shift</option><option>Conviction Change</option><option>Market Observation</option><option>Risk Alert</option></select></div>
              <div><div style={{color:"#3a4a5e",fontSize:9,marginBottom:4}}>SYMBOL(S)</div><input value={newInsight.symbols} onChange={e=>setNewInsight({...newInsight,symbols:e.target.value.toUpperCase()})} style={inputSt} placeholder="QXO, GOOGL"/></div>
              <div><div style={{color:"#3a4a5e",fontSize:9,marginBottom:4}}>PRIORITY</div><select value={newInsight.priority} onChange={e=>setNewInsight({...newInsight,priority:e.target.value})} style={inputSt}><option>Urgent</option><option>Important</option><option>Note</option></select></div>
            </div>
            <div style={{marginBottom:12}}><div style={{color:"#3a4a5e",fontSize:9,marginBottom:4}}>WHAT'S THE INSIGHT?</div><textarea value={newInsight.text} onChange={e=>setNewInsight({...newInsight,text:e.target.value})} style={{...inputSt,height:70,resize:"vertical"}} placeholder="I just realized that..."/></div>
            <div style={{marginBottom:12}}><div style={{color:"#3a4a5e",fontSize:9,marginBottom:4}}>ACTION TO TAKE</div><textarea value={newInsight.action} onChange={e=>setNewInsight({...newInsight,action:e.target.value})} style={{...inputSt,height:50,resize:"vertical"}} placeholder="Trim position, research more, no action needed..."/></div>
            <button onClick={addInsight} style={{...btnSt(true),padding:"8px 24px",fontSize:11,background:"#7c4dff",color:"#fff"}}>LOG INSIGHT</button>
          </div>)}
          {journalView==="insights" && insights.map(ins=>{const isExp=expandedInsight===ins.id;return(
            <div key={ins.id} onClick={()=>setExpandedInsight(isExp?null:ins.id)} style={{background:isExp?"#111825":"#0e1525",border:"1px solid #182038",borderLeft:"3px solid "+(insightColors[ins.type]||"#3a4a5e"),borderRadius:"0 6px 6px 0",padding:"12px 16px",marginBottom:6,cursor:"pointer"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{color:"#3a4a5e",fontSize:10}}>{ins.date}</span>
                  <span style={{background:(insightColors[ins.type]||"#3a4a5e")+"33",color:insightColors[ins.type]||"#3a4a5e",padding:"2px 8px",borderRadius:3,fontSize:9,fontWeight:700}}>{ins.type}</span>
                  <span style={{fontWeight:700,color:"#c8d0dc"}}>{ins.symbols}</span>
                </div>
                <span style={{background:(priorityColors[ins.priority]||"#3a4a5e")+"33",color:priorityColors[ins.priority]||"#3a4a5e",padding:"2px 8px",borderRadius:3,fontSize:8,fontWeight:700}}>{ins.priority}</span>
              </div>
              <div style={{color:"#c8d0dc",fontSize:11,marginTop:6,lineHeight:1.5}}>{ins.text}</div>
              {isExp && ins.action && (<div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #182038"}}>
                <div style={{color:"#ff9100",fontSize:9,letterSpacing:1,fontWeight:700,marginBottom:4}}>ACTION</div>
                <div style={{color:"#c8d0dc",fontSize:11,lineHeight:1.5}}>{ins.action}</div>
              </div>)}
            </div>
          )})}
</div>)}

        {/* ═══════════════ PERFORMANCE ═══════════════ */}
        {tab === "performance" && (<div>
          <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
            {[{id:"line",l:"Line & Area"},{id:"bar",l:"Bar Charts"},{id:"waterfall",l:"Waterfall"},{id:"scatter",l:"Risk/Return"},{id:"heatmap",l:"Heat Map"}].map(v=>
              <button key={v.id} onClick={()=>setPerfView(v.id)} style={btnSt(perfView===v.id)}>{v.l}</button>
            )}
            <div style={{marginLeft:"auto",display:"flex",gap:3}}>
              {Object.keys(timeRanges).map(r=><button key={r} onClick={()=>setTimeRange(r)} style={btnSt(timeRange===r)}>{r}</button>)}
            </div>
          </div>

          {/* LINE & AREA */}
          {perfView==="line"&&(<div>
            <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
              <select value={perfLineFilter} onChange={e=>{setPerfLineFilter(e.target.value)}} style={{background:"#111825",color:"#c8d0dc",border:"1px solid #151d2e",borderRadius:4,padding:"5px 10px",fontFamily:"inherit",fontSize:10}}>
                <option value="household">Household Total</option>
                <option value="owners">By Owner</option>
                <option value="accounts">Select Accounts</option>
                <option value="factors">Select Factors</option>
                <option value="taxfree">Taxable vs Tax-Free</option>
                <option value="risk">By Risk Tier</option>
                <option value="conviction">By Conviction</option>
                <option value="stacked">Stacked Area</option>
              </select>
              {perfLineFilter==="accounts"&&<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {["Taxable","IRA","IRA","IRA","401k","401k","401k","Crypto"].map(a=>
                  <button key={a} onClick={()=>setPerfSelAccts(prev=>prev.includes(a)?prev.filter(x=>x!==a):[...prev,a])} style={{padding:"3px 8px",background:perfSelAccts.includes(a)?(ACCT_COLORS[a]||"#00e5ff")+"33":"#0c1019",color:perfSelAccts.includes(a)?ACCT_COLORS[a]||"#00e5ff":"#3a4a5e",border:"1px solid "+(perfSelAccts.includes(a)?ACCT_COLORS[a]||"#00e5ff":"#151d2e"),borderRadius:3,cursor:"pointer",fontFamily:"inherit",fontSize:9,fontWeight:600}}>{a}</button>
                )}
              </div>}
              {perfLineFilter==="factors"&&<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {["Bitcoin/Crypto","AI/ML","Rollup/M&A","PropTech/RE","Gold/Inflation","Index/Passive","AdTech","Fintech","Sports/Betting","Data Centers"].map(f=>
                  <button key={f} onClick={()=>setPerfSelFactors(prev=>prev.includes(f)?prev.filter(x=>x!==f):[...prev,f])} style={{padding:"3px 8px",background:perfSelFactors.includes(f)?(FACTORS[f]||"#666")+"33":"#0c1019",color:perfSelFactors.includes(f)?FACTORS[f]||"#666":"#3a4a5e",border:"1px solid "+(perfSelFactors.includes(f)?FACTORS[f]||"#666":"#151d2e"),borderRadius:3,cursor:"pointer",fontFamily:"inherit",fontSize:9,fontWeight:600}}>{f.split("/")[0]}</button>
                )}
              </div>}
            </div>
            <div style={{background:"#0c1019",border:"1px solid #151d2e",borderRadius:8,padding:16}}>
              {perfLineFilter==="household"&&<LineChart data={filteredHistory} onClickDate={setSelectedDate} lines={[{key:"hh",label:"Household",color:"#00e5ff",width:2.5,acc:d=>d.household}]}/>}
              {perfLineFilter==="owners"&&<LineChart data={filteredHistory} onClickDate={setSelectedDate} lines={[{key:"j",label:"Demo",color:"#00e5ff",acc:d=>(d.accounts?.Taxable||0)+(d.accounts?.Crypto||0)},{key:"jr",label:"Retirement",color:"#448aff",acc:d=>(d.accounts?.["IRA"]||0},{key:"jsr",label:"401k",color:"#69f0ae",acc:d=>(d.accounts?.["401k"]||0}]}/>}
              {perfLineFilter==="accounts"&&<LineChart data={filteredHistory} onClickDate={setSelectedDate} height={300} lines={perfSelAccts.map(k=>({key:k,label:k,color:ACCT_COLORS[k]||"#666",width:2,acc:d=>d.accounts?.[k]||0}))}/>}
              {perfLineFilter==="factors"&&<LineChart data={filteredHistory} onClickDate={setSelectedDate} height={300} lines={perfSelFactors.map(k=>({key:k,label:k.split("/")[0],color:FACTOR_CHART_COLORS[k]||"#666",width:2,acc:d=>d.factors?.[k]||0}))}/>}
              {perfLineFilter==="taxfree"&&<LineChart data={filteredHistory} onClickDate={setSelectedDate} lines={[{key:"t",label:"Taxable",color:"#ef5350",width:2,acc:d=>(d.accounts?.Taxable||0)+(d.accounts?.Crypto||0)},{key:"f",label:"Tax-Advantaged",color:"#4caf50",width:2,acc:d=>d.household-(d.accounts?.Taxable||0)-(d.accounts?.Crypto||0)}]}/>}
              {perfLineFilter==="risk"&&<LineChart data={filteredHistory} onClickDate={setSelectedDate} height={300} lines={[{key:"c",label:"Core",color:"#1565C0",width:2,acc:d=>d.household*.35},{key:"g",label:"Growth",color:"#2E7D32",width:1.5,acc:d=>d.household*.25},{key:"s",label:"Speculative",color:"#E65100",width:1.5,acc:d=>d.household*.15},{key:"m",label:"Moonshot",color:"#B71C1C",width:1.5,acc:d=>d.household*.10}]}/>}
              {perfLineFilter==="conviction"&&<LineChart data={filteredHistory} onClickDate={setSelectedDate} height={300} lines={[{key:"h",label:"Hold",color:"#5c6b7a",width:2,acc:d=>d.household*.50},{key:"a",label:"Add",color:"#4caf50",width:2,acc:d=>d.household*.25},{key:"t",label:"Trim",color:"#ef5350",width:1.5,acc:d=>d.household*.15},{key:"r",label:"Review",color:"#ff9100",width:1.5,acc:d=>d.household*.10}]}/>}
              {perfLineFilter==="stacked"&&<LineChart data={filteredHistory} onClickDate={setSelectedDate} height={300} lines={["Taxable","IRA","IRA","IRA","401k","401k","401k","Crypto"].map(k=>({key:k,label:k,color:ACCT_COLORS[k]||"#666",acc:d=>d.accounts?.[k]||0}))}/>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginTop:12}}>
              {[["Starting",fmtF(filteredHistory[0]?.household||0),"#3a4a5e"],["Current",fmtF(filteredHistory[filteredHistory.length-1]?.household||0),"#00e5ff"],["$ P&L",(perf.household?.abs>=0?"+":"")+fmtF(perf.household?.abs||0),perf.household?.abs>=0?"#4caf50":"#ef5350"],["Annualized",(perf.household?.ann>=0?"+":"")+pct(perf.household?.ann||0),perf.household?.ann>=0?"#4caf50":"#ef5350"]].map((c,i)=>
                <div key={i} style={{background:"#0c1019",border:"1px solid #151d2e",borderRadius:6,padding:"10px 14px",textAlign:"center"}}>
                  <div style={{color:"#3a4a5e",fontSize:9,letterSpacing:1,marginBottom:3}}>{c[0]}</div>
                  <div style={{fontSize:16,fontWeight:800,color:c[2]}}>{c[1]}</div>
                </div>
              )}

            {selectedDate && (<div style={{background:"#0c1019",border:"1px solid #ff910033",borderRadius:8,padding:16,marginTop:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontSize:11,color:"#ff9100",fontWeight:700,letterSpacing:1}}>SNAPSHOT: {new Date(selectedDate.ts).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}</div>
                <button onClick={()=>setSelectedDate(null)} style={{background:"#1a274433",border:"1px solid #151d2e",borderRadius:4,color:"#3a4a5e",cursor:"pointer",padding:"3px 10px",fontFamily:"inherit",fontSize:9}}>CLOSE</button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8}}>
                <div style={{background:"#111825",borderRadius:6,padding:"8px 12px",textAlign:"center"}}>
                  <div style={{color:"#3a4a5e",fontSize:9,letterSpacing:1}}>HOUSEHOLD</div>
                  <div style={{color:"#00e5ff",fontSize:16,fontWeight:800}}>{fmtF(selectedDate.household||0)}</div>
                </div>
                {selectedDate.accounts && Object.entries(selectedDate.accounts).filter(([k,v])=>k!=="IRA"&&v>5000).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([k,v])=>
                  <div key={k} style={{background:"#111825",borderRadius:6,padding:"8px 12px",textAlign:"center"}}>
                    <div style={{color:"#3a4a5e",fontSize:9,letterSpacing:1}}>{k}</div>
                    <div style={{color:ACCT_COLORS[k]||"#c8d0dc",fontSize:14,fontWeight:700}}>{fmtF(v)}</div>
                  </div>
                )}
              </div>
              {selectedDate.factors && (<div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:10}}>
                {Object.entries(selectedDate.factors).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([k,v])=>
                  <span key={k} style={{background:"#111825",borderRadius:4,padding:"4px 10px",fontSize:10}}>
                    <span style={{color:FACTOR_CHART_COLORS[k]||"#5c6b7a"}}>{k.split("/")[0]}</span>
                    <span style={{color:"#c8d0dc",marginLeft:4,fontWeight:600}}>{fmtF(v)}</span>
                  </span>
                )}
              </div>)}
            </div>)}
            </div>
          </div>)}

          {/* BAR CHARTS */}
          {perfView==="bar"&&(<div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div style={{background:"#0c1019",border:"1px solid #151d2e",borderRadius:8,padding:16}}>
                <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:8}}>RETURN % BY ACCOUNT ({timeRange})</div>
                <BarChartH data={Object.keys(ACCT_COLORS).filter(k=>k!=="IRA"&&k!=="IRA").map(k=>({name:k,value:(perf[k]?.pct||0)*100,color:ACCT_COLORS[k],label:(perf[k]?.pct>=0?"+":"")+pct(perf[k]?.pct||0)}))}/>
              </div>
              <div style={{background:"#0c1019",border:"1px solid #151d2e",borderRadius:8,padding:16}}>
                <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:8}}>RETURN % BY FACTOR ({timeRange})</div>
                <BarChartH data={Object.keys(FACTOR_CHART_COLORS).map(k=>({name:k.split("/")[0],value:(perf["f_"+k]?.pct||0)*100,color:FACTOR_CHART_COLORS[k],label:(perf["f_"+k]?.pct>=0?"+":"")+pct(perf["f_"+k]?.pct||0)}))}/>
              </div>
            </div>
            <div style={{background:"#0c1019",border:"1px solid #151d2e",borderRadius:8,padding:16,marginTop:12}}>
              <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:8}}>$ P&L BY ACCOUNT</div>
              <BarChartH data={Object.keys(ACCT_COLORS).filter(k=>k!=="IRA").map(k=>({name:k,value:perf[k]?.abs||0,color:ACCT_COLORS[k]}))}/>
            </div>
          </div>)}

          {/* WATERFALL */}
          {perfView==="waterfall"&&(<div>
            <div style={{background:"#0c1019",border:"1px solid #151d2e",borderRadius:8,padding:16}}>
              <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:4}}>P&L WATERFALL — WHAT DROVE YOUR GAINS & LOSSES</div>
              <div style={{fontSize:9,color:"#5c6b7a",marginBottom:12}}>Each bar = unrealized P&L for that position. Green = gain, Red = loss. Sorted by impact.</div>
              <BarChartH height={Math.max(300,consolidated.length*28)} data={consolidated.filter(c=>Math.abs(c.mv-c.basis)>500).map(c=>({name:c.name,value:c.mv-c.basis,color:c.mv>=c.basis?"#4caf50":"#ef5350",label:(c.mv>=c.basis?"+":"")+fmt(c.mv-c.basis)})).sort((a,b)=>b.value-a.value)}/>
            </div>
          </div>)}

          {/* SCATTER */}
          {perfView==="scatter"&&(<div>
            <div style={{background:"#0c1019",border:"1px solid #151d2e",borderRadius:8,padding:16}}>
              <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:4}}>RISK vs RETURN BY FACTOR</div>
              <div style={{fontSize:9,color:"#5c6b7a",marginBottom:12}}>Bubble size = $ exposure. X-axis = volatility proxy. Y-axis = period return. Top-left = high return, low risk (ideal).</div>
              <ScatterChart height={320} data={Object.keys(FACTOR_CHART_COLORS).map(f=>{
                const p2=perf["f_"+f];if(!p2)return null;
                const mv2=P.reduce((s,pos)=>s+pos.mv*(pos.factors?.[f]||0),0);
                return{name:f.split("/")[0],x:Math.abs(p2.pct)*100+(Math.random()*3),y:p2.pct*100,size:mv2,color:FACTOR_CHART_COLORS[f]||"#666"};
              }).filter(Boolean)}/>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
                {Object.keys(FACTOR_CHART_COLORS).map(f=>{const p2=perf["f_"+f];return p2?<span key={f} style={{fontSize:9,color:"#c8d0dc",display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:8,background:FACTOR_CHART_COLORS[f]}}/>{f.split("/")[0]}: {p2.pct>=0?"+":""}{pct(p2.pct)}</span>:null})}
              </div>
            </div>
          </div>)}

          {/* HEATMAP */}
          {perfView==="heatmap"&&(<div>
            <div style={{background:"#0c1019",border:"1px solid #151d2e",borderRadius:8,padding:16}}>
              <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:4}}>CONCENTRATION HEAT MAP — Accounts x Factors</div>
              
              <div style={{fontSize:9,color:"#5c6b7a",marginBottom:4,lineHeight:1.5}}>
                HOW TO READ: Each cell shows what % of that account is exposed to that factor. Brighter green = heavy long exposure. Dark = no exposure. Use this to spot: (1) which accounts are concentrated in which themes, (2) where you have overlap across accounts, (3) which factors have no hedge.
              </div>
              <HeatMapChart rows={Object.keys(ACCT_COLORS).filter(k=>k!=="IRA")} cols={Object.keys(FACTOR_CHART_COLORS).slice(0,8)} getData={(acct,factor)=>{
                const acctPos=P.filter(p=>p.acct===acct);
                const exposure=acctPos.reduce((s,p)=>s+(p.mv*(p.factors?.[factor]||0)),0);
                const total=acctPos.reduce((s,p)=>s+p.mv,0);
                return total>0?exposure/total:0;
              }}/>
            </div>
          </div>)}
        </div>)}


      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
