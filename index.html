<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Command Center</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06080f;color:#c8d0dc;font-family:'Courier New',monospace;min-height:100vh}
</style>
</head>
<body>
<div id="root"><div style="color:#3a4a5e;padding:40px;text-align:center">Loading dashboard...</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useMemo} = React;
const fmt=n=>n>=1e6?`$${(n/1e6).toFixed(2)}M`:n>=1e3?`$${(n/1e3).toFixed(1)}K`:`$${n.toFixed(0)}`;
const fmtF=n=>`$${Math.round(n).toLocaleString()}`;
const pct=n=>`${(n*100).toFixed(1)}%`;

const POSITIONS=[
{id:"AAPL",acct:"Brokerage",type:"Stock",qty:500,basis:87500,mv:124000,price:248,factors:{"AI/ML":.4,"Consumer Tech":.4,"Services":.2},risk:"Core",conv:"Hold"},
{id:"MSFT",acct:"Brokerage",type:"Stock",qty:300,basis:78000,mv:126000,price:420,factors:{"AI/ML":.5,"Cloud":.3,"Enterprise":.2},risk:"Core",conv:"Hold"},
{id:"NVDA",acct:"Brokerage",type:"Stock",qty:200,basis:22000,mv:34600,price:173,factors:{"AI/ML":.5,"Data Centers":.3,"Gaming":.2},risk:"Growth",conv:"Add"},
{id:"AMZN",acct:"Brokerage",type:"Stock",qty:150,basis:25500,mv:30750,price:205,factors:{"Cloud":.4,"Consumer Tech":.3,"AI/ML":.3},risk:"Core",conv:"Hold"},
{id:"GOOGL",acct:"Brokerage",type:"Stock",qty:200,basis:28000,mv:60200,price:301,factors:{"AI/ML":.5,"AdTech":.3,"Cloud":.2},risk:"Core",conv:"Hold"},
{id:"TSLA",acct:"Brokerage",type:"Stock",qty:100,basis:18000,mv:39200,price:392,factors:{"EV/Clean Energy":.4,"AI/ML":.3,"Robotics":.3},risk:"Growth",conv:"Hold"},
{id:"IBIT",acct:"Brokerage",type:"ETF",qty:500,basis:22500,mv:19900,price:39.80,factors:{"Bitcoin/Crypto":1},risk:"Core",conv:"Add"},
{id:"COIN",acct:"Brokerage",type:"Stock",qty:50,basis:12500,mv:9875,price:197.50,factors:{"Bitcoin/Crypto":.7,"Fintech":.3},risk:"Growth",conv:"Hold"},
{id:"VST",acct:"Brokerage",type:"Stock",qty:200,basis:24000,mv:31600,price:158,factors:{"Energy/Power":.7,"AI/ML":.2,"Nuclear":.1},risk:"Growth",conv:"Add"},
{id:"GLD",acct:"Brokerage",type:"ETF",qty:40,basis:15200,mv:16520,price:413,factors:{"Gold/Inflation":1},risk:"Hedge",conv:"Hold"},
{id:"JPM",acct:"Brokerage",type:"Stock",qty:100,basis:17500,mv:24800,price:248,factors:{"Financials":.7,"Fintech":.3},risk:"Core",conv:"Hold"},
{id:"UNH",acct:"Brokerage",type:"Stock",qty:30,basis:15900,mv:16500,price:550,factors:{"Healthcare":.8,"AI/ML":.2},risk:"Core",conv:"Hold"},
{id:"PLTR",acct:"IRA",type:"Stock",qty:400,basis:9200,mv:39600,price:99,factors:{"AI/ML":.6,"Defense":.3,"Data Centers":.1},risk:"Growth",conv:"Hold"},
{id:"NVDA-ira",acct:"IRA",type:"Stock",qty:100,basis:11000,mv:17300,price:173,factors:{"AI/ML":.5,"Data Centers":.3,"Gaming":.2},risk:"Growth",conv:"Add"},
{id:"QXO",acct:"IRA",type:"Stock",qty:1000,basis:21000,mv:18640,price:18.64,factors:{"Rollup/M&A":1},risk:"Conviction",conv:"Add"},
{id:"IBIT-ira",acct:"IRA",type:"ETF",qty:300,basis:16500,mv:11940,price:39.80,factors:{"Bitcoin/Crypto":1},risk:"Core",conv:"Hold"},
{id:"TSLA-ira",acct:"IRA",type:"Stock",qty:50,basis:15000,mv:19600,price:392,factors:{"EV/Clean Energy":.4,"AI/ML":.3,"Robotics":.3},risk:"Growth",conv:"Hold"},
{id:"VST-ira",acct:"IRA",type:"Stock",qty:100,basis:12000,mv:15800,price:158,factors:{"Energy/Power":.7,"AI/ML":.2,"Nuclear":.1},risk:"Growth",conv:"Add"},
{id:"HOOD",acct:"IRA",type:"Stock",qty:150,basis:4200,mv:10634,price:70.89,factors:{"Fintech":.6,"Bitcoin/Crypto":.2,"Consumer Tech":.2},risk:"Growth",conv:"Hold"},
{id:"BTC",acct:"Crypto",type:"Crypto",qty:0.75,basis:32000,mv:52972,price:70629,factors:{"Bitcoin/Crypto":1},risk:"Core",conv:"Hold"},
{id:"ETH",acct:"Crypto",type:"Crypto",qty:5,basis:15000,mv:10250,price:2050,factors:{"Bitcoin/Crypto":.5,"AI/ML":.2,"DeFi":.3},risk:"Growth",conv:"Hold"},
{id:"SOL",acct:"Crypto",type:"Crypto",qty:50,basis:4000,mv:4500,price:90,factors:{"Bitcoin/Crypto":.4,"DeFi":.3,"AI/ML":.3},risk:"Speculative",conv:"Hold"},
{id:"AAPL-call",acct:"Brokerage",type:"Option",qty:5,basis:3500,mv:4250,price:8.50,strike:260,exp:"2026-09-18",factors:{"Consumer Tech":.5,"AI/ML":.5},risk:"Growth",conv:"Monitor"},
{id:"TSLA-call",acct:"IRA",type:"Option",qty:3,basis:4800,mv:3600,price:12,strike:450,exp:"2027-01-15",factors:{"EV/Clean Energy":.5,"Robotics":.5},risk:"Speculative",conv:"Hold"},
{id:"VINIX",acct:"401k",type:"Index",qty:300,basis:145000,mv:157500,price:525,factors:{"Index/Passive":.6,"AI/ML":.15,"Financials":.15,"Healthcare":.1},risk:"Core",conv:"Hold"},
];
const CASH=[{acct:"Brokerage",amt:125000},{acct:"IRA",amt:15000},{acct:"401k",amt:8000},{acct:"Crypto",amt:12000}];
const ACCT_COLORS={"Brokerage":"#00e5ff","IRA":"#448aff","401k":"#7c4dff","Crypto":"#f7931a"};
const FACTOR_COLORS={"Bitcoin/Crypto":"#F7931A","AI/ML":"#4285F4","Rollup/M&A":"#2ECC71","Energy/Power":"#E74C3C","Gold/Inflation":"#FFD700","Index/Passive":"#1E88E5","Cloud":"#00BCD4","Fintech":"#FF9800","Consumer Tech":"#FF6B35","Data Centers":"#00897B","EV/Clean Energy":"#8E44AD","Healthcare":"#E91E63","Financials":"#455A64","Defense":"#26A69A","AdTech":"#AB47BC","Robotics":"#78909C","Gaming":"#CDDC39","Enterprise":"#607D8B","Services":"#9E9E9E","DeFi":"#00E676","Nuclear":"#FF5722"};

function App(){
  const [tab,setTab]=useState("overview");
  const [acctFilter,setAcctFilter]=useState("All");
  const P=POSITIONS;
  const totalMV=P.reduce((s,p)=>s+p.mv,0);
  const totalCash=CASH.reduce((s,c)=>s+c.amt,0);
  const totalHH=totalMV+totalCash;
  const filtered=acctFilter==="All"?P:P.filter(p=>p.acct===acctFilter);

  // Factor exposure
  const factorExp=useMemo(()=>{
    const fm={};let total=0;
    filtered.forEach(p=>{Object.entries(p.factors||{}).forEach(([f,w])=>{fm[f]=(fm[f]||0)+p.mv*w;total+=p.mv*w})});
    return Object.entries(fm).sort((a,b)=>b[1]-a[1]).map(([name,val])=>({name,val,pct:total>0?val/total:0}));
  },[filtered]);

  // Risk breakdown
  const riskBreak=useMemo(()=>{
    const rm={};filtered.forEach(p=>{rm[p.risk]=(rm[p.risk]||0)+p.mv});
    return Object.entries(rm).sort((a,b)=>b[1]-a[1]).map(([name,val])=>({name,val,pct:val/totalMV}));
  },[filtered,totalMV]);

  // Consolidated
  const consolidated=useMemo(()=>{
    const cm={};
    P.forEach(p=>{const base=p.id.split("-")[0];if(!cm[base])cm[base]={name:base,mv:0,basis:0,accounts:new Set(),factors:p.factors};cm[base].mv+=p.mv;cm[base].basis+=p.basis;cm[base].accounts.add(p.acct)});
    return Object.values(cm).sort((a,b)=>b.mv-a.mv);
  },[]);

  // Options
  const options=P.filter(p=>p.exp).map(p=>({...p,dte:Math.max(0,Math.floor((new Date(p.exp)-new Date())/864e5)),pl:p.mv-p.basis}));

  const tabs=[{id:"overview",l:"Overview"},{id:"factors",l:"Factor Exposure"},{id:"positions",l:"All Positions"},{id:"options",l:`Options (${options.length})`},{id:"performance",l:"Performance"}];
  const btn=(a)=>({padding:"5px 14px",background:a?"#00e5ff":"#0c1019",color:a?"#06080f":"#3a4a5e",border:"1px solid #151d2e",borderRadius:4,cursor:"pointer",fontFamily:"inherit",fontSize:10,fontWeight:700,letterSpacing:1});

  return(
    <div style={{background:"#06080f",color:"#c8d0dc",minHeight:"100vh",fontFamily:"'Courier New',monospace",fontSize:12}}>
      {/* HEADER */}
      <div style={{background:"linear-gradient(90deg,#0a0f1a,#111a2e)",borderBottom:"1px solid #182038",padding:"14px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:16,fontWeight:900,letterSpacing:3,color:"#00e5ff"}}>PORTFOLIO COMMAND CENTER</span>
        <div style={{display:"flex",gap:20,alignItems:"center"}}>
          {[["TOTAL",fmtF(totalHH),"#00e5ff"],["HOLDINGS",fmt(totalMV),"#c8d0dc"],["CASH",fmt(totalCash),"#4caf50"],["CASH %",pct(totalCash/totalHH),totalCash/totalHH>.25?"#ff9100":"#4caf50"],["SOURCE","DEMO","#7c4dff"],["PRICES","STATIC","#3a4a5e"]].map(([l,v,c])=>(
            <div key={l} style={{textAlign:"right"}}>
              <div style={{color:"#3a4a5e",fontSize:9,letterSpacing:1}}>{l}</div>
              <div style={{fontSize:l==="TOTAL"?20:14,fontWeight:700,color:c}}>{v}</div>
            </div>
          ))}
        </div>
      </div>
      {/* TABS */}
      <div style={{display:"flex",borderBottom:"1px solid #151d2e",background:"#090d18"}}>
        {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"10px 18px",background:tab===t.id?"#111825":"transparent",border:"none",borderBottom:tab===t.id?"2px solid #00e5ff":"2px solid transparent",color:tab===t.id?"#00e5ff":"#3a4a5e",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700,letterSpacing:1}}>{t.l}</button>)}
        <div style={{marginLeft:"auto",padding:"8px 16px"}}>
          <select value={acctFilter} onChange={e=>setAcctFilter(e.target.value)} style={{background:"#111825",color:"#c8d0dc",border:"1px solid #151d2e",borderRadius:4,padding:"4px 8px",fontFamily:"inherit",fontSize:10}}>
            <option value="All">All Accounts</option>
            {Object.keys(ACCT_COLORS).map(a=><option key={a} value={a}>{a}</option>)}
          </select>
        </div>
      </div>
      <div style={{padding:"16px 24px"}}>

        {/* OVERVIEW */}
        {tab==="overview"&&(<div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12,marginBottom:16}}>
            {Object.keys(ACCT_COLORS).map(acct=>{
              const ap=P.filter(p=>p.acct===acct);
              const amv=ap.reduce((s,p)=>s+p.mv,0);
              const ac=CASH.find(c=>c.acct===acct)?.amt||0;
              return(<div key={acct} style={{background:"#0e1525",border:"1px solid #182038",borderLeft:"3px solid "+ACCT_COLORS[acct],borderRadius:"0 6px 6px 0",padding:14}}>
                <div style={{fontSize:9,color:"#3a4a5e",letterSpacing:1}}>Demo</div>
                <div style={{fontSize:14,fontWeight:800,color:ACCT_COLORS[acct]}}>{acct}</div>
                <div style={{fontSize:20,fontWeight:900,color:"#c8d0dc",margin:"6px 0"}}>{fmt(amv+ac)}</div>
                <div style={{fontSize:10,color:"#5c6b7a"}}>{fmt(amv)} inv · {fmt(ac)} cash</div>
              </div>)
            })}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
            <div>
              <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:8}}>FACTOR EXPOSURE</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {factorExp.slice(0,10).map(f=>(
                  <div key={f.name} style={{background:"#0e1525",border:"1px solid #182038",borderRadius:6,padding:"6px 12px",display:"flex",alignItems:"center",gap:6}}>
                    <span style={{width:8,height:8,borderRadius:2,background:FACTOR_COLORS[f.name]||"#666"}}/>
                    <span style={{fontSize:10,color:"#c8d0dc"}}>{f.name}</span>
                    <span style={{fontSize:10,fontWeight:700,color:"#00e5ff"}}>{pct(f.pct)}</span>
                  </div>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:8}}>RISK TIER BREAKDOWN</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {riskBreak.map(r=>(
                  <div key={r.name} style={{background:"#0e1525",border:"1px solid #182038",borderRadius:6,padding:"6px 12px"}}>
                    <span style={{fontSize:10,color:"#c8d0dc"}}>{r.name}</span>
                    <span style={{fontSize:10,fontWeight:700,color:"#00e5ff",marginLeft:6}}>{pct(r.pct)}</span>
                    <span style={{fontSize:9,color:"#3a4a5e",marginLeft:4}}>({filtered.filter(p=>p.risk===r.name).length})</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
          <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:8}}>TOP POSITIONS</div>
          {consolidated.slice(0,10).map(c=>(
            <div key={c.name} style={{background:"#0e1525",border:"1px solid #182038",borderRadius:6,padding:"10px 16px",marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <span style={{fontWeight:800,fontSize:14,color:"#c8d0dc",marginRight:12}}>{c.name}</span>
                <span style={{color:"#00e5ff",fontWeight:700}}>{fmtF(c.mv)}</span>
                <span style={{color:"#3a4a5e",marginLeft:8}}>{pct(c.mv/totalHH)}</span>
              </div>
              <div>
                <span style={{color:c.mv>=c.basis?"#4caf50":"#ef5350",fontSize:11}}>{c.mv>=c.basis?"+":""}{fmt(c.mv-c.basis)}</span>
                <span style={{color:"#3a4a5e",marginLeft:8,fontSize:10}}>{c.accounts.size} acct{c.accounts.size>1?"s":""}</span>
              </div>
            </div>
          ))}
        </div>)}

        {/* FACTOR EXPOSURE */}
        {tab==="factors"&&(<div>
          <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:12}}>WEIGHTED FACTOR EXPOSURE</div>
          {factorExp.map((f,i)=>(
            <div key={f.name} style={{display:"flex",alignItems:"center",gap:12,marginBottom:6}}>
              <span style={{width:120,fontSize:11,color:"#c8d0dc",textAlign:"right"}}>{f.name}</span>
              <div style={{flex:1,height:24,background:"#111825",borderRadius:4,position:"relative",overflow:"hidden"}}>
                <div style={{width:pct(f.pct),height:"100%",background:FACTOR_COLORS[f.name]||"#666",borderRadius:4,opacity:.7}}/>
                <span style={{position:"absolute",left:8,top:5,fontSize:10,fontWeight:700,color:"#fff"}}>{pct(f.pct)} — {fmtF(f.val)}</span>
              </div>
            </div>
          ))}
        </div>)}

        {/* ALL POSITIONS */}
        {tab==="positions"&&(<div>
          <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:8}}>ALL POSITIONS — {filtered.length}</div>
          <div style={{background:"#0e1525",border:"1px solid #182038",borderRadius:6,overflow:"hidden"}}>
            <div style={{display:"grid",gridTemplateColumns:"100px 90px 60px 50px 80px 80px 80px 80px 60px",padding:"8px 12px",background:"#0a0f1a",borderBottom:"1px solid #182038",fontSize:9,color:"#3a4a5e",letterSpacing:1,fontWeight:700}}>
              <span>SYMBOL</span><span>ACCOUNT</span><span>TYPE</span><span>QTY</span><span>PRICE</span><span>BASIS</span><span>MV</span><span>P&L</span><span>RISK</span>
            </div>
            {filtered.map((p,i)=>{const pl=p.mv-p.basis;return(
              <div key={p.id} style={{display:"grid",gridTemplateColumns:"100px 90px 60px 50px 80px 80px 80px 80px 60px",padding:"8px 12px",borderBottom:"1px solid #111a28",background:i%2===0?"#0e1525":"#0c1220",fontSize:11}}>
                <span style={{fontWeight:700,color:ACCT_COLORS[p.acct]||"#c8d0dc"}}>{p.id}</span>
                <span style={{color:"#3a4a5e"}}>{p.acct}</span>
                <span>{p.type}</span>
                <span>{p.qty}</span>
                <span>${p.price}</span>
                <span style={{color:"#3a4a5e"}}>{fmt(p.basis)}</span>
                <span style={{color:"#00e5ff"}}>{fmt(p.mv)}</span>
                <span style={{color:pl>=0?"#4caf50":"#ef5350"}}>{pl>=0?"+":""}{fmt(Math.abs(pl))}</span>
                <span style={{fontSize:9,color:"#5c6b7a"}}>{p.risk}</span>
              </div>
            )})}
          </div>
        </div>)}

        {/* OPTIONS */}
        {tab==="options"&&(<div>
          <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:8}}>OPTIONS & WARRANTS</div>
          <div style={{background:"#0e1525",border:"1px solid #182038",borderRadius:6,overflow:"hidden"}}>
            <div style={{display:"grid",gridTemplateColumns:"120px 90px 60px 50px 70px 90px 60px 80px 80px 70px",padding:"8px 12px",background:"#0a0f1a",borderBottom:"1px solid #182038",fontSize:9,color:"#3a4a5e",letterSpacing:1,fontWeight:700}}>
              <span>SYMBOL</span><span>ACCOUNT</span><span>TYPE</span><span>QTY</span><span>STRIKE</span><span>EXPIRY</span><span>DTE</span><span>BASIS</span><span>MV</span><span>P&L</span>
            </div>
            {options.map((o,i)=>{const sc=o.dte<=14?"#ff1744":o.dte<=30?"#ff9100":"#4caf50";return(
              <div key={o.id} style={{display:"grid",gridTemplateColumns:"120px 90px 60px 50px 70px 90px 60px 80px 80px 70px",padding:"8px 12px",borderBottom:"1px solid #111a28",background:o.dte<=14?"rgba(255,23,68,0.06)":i%2===0?"#0e1525":"#0c1220",fontSize:11}}>
                <span style={{fontWeight:700}}>{o.id}</span>
                <span style={{color:"#3a4a5e"}}>{o.acct}</span>
                <span>{o.type}</span>
                <span>{o.qty}</span>
                <span>${o.strike}</span>
                <span>{o.exp}</span>
                <span style={{color:sc,fontWeight:700}}>{o.dte}d</span>
                <span style={{color:"#3a4a5e"}}>{fmt(o.basis)}</span>
                <span style={{color:"#00e5ff"}}>{fmt(o.mv)}</span>
                <span style={{color:o.pl>=0?"#4caf50":"#ef5350"}}>{o.pl>=0?"+":""}{fmt(Math.abs(o.pl))}</span>
              </div>
            )})}
          </div>
        </div>)}

        {/* PERFORMANCE */}
        {tab==="performance"&&(<div>
          <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:12}}>PERFORMANCE SUMMARY</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
            {[["Total Invested",fmtF(P.reduce((s,p)=>s+p.basis,0)),"#3a4a5e"],["Current Value",fmtF(totalMV),"#00e5ff"],["Unrealized P&L",(totalMV-P.reduce((s,p)=>s+p.basis,0)>=0?"+":"")+fmtF(totalMV-P.reduce((s,p)=>s+p.basis,0)),totalMV>=P.reduce((s,p)=>s+p.basis,0)?"#4caf50":"#ef5350"],["Return %",pct((totalMV-P.reduce((s,p)=>s+p.basis,0))/P.reduce((s,p)=>s+p.basis,0)),totalMV>=P.reduce((s,p)=>s+p.basis,0)?"#4caf50":"#ef5350"]].map((c,i)=>
              <div key={i} style={{background:"#0e1525",border:"1px solid #182038",borderRadius:8,padding:"16px 20px",textAlign:"center"}}>
                <div style={{color:"#3a4a5e",fontSize:9,letterSpacing:1,marginBottom:6}}>{c[0]}</div>
                <div style={{fontSize:22,fontWeight:800,color:c[2]}}>{c[1]}</div>
              </div>
            )}
          </div>
          <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:8}}>P&L BY POSITION</div>
          {consolidated.map(c=>{const pl=c.mv-c.basis;const plPct=c.basis>0?pl/c.basis:0;return(
            <div key={c.name} style={{display:"flex",alignItems:"center",gap:12,marginBottom:4}}>
              <span style={{width:60,fontSize:11,fontWeight:700,color:"#c8d0dc",textAlign:"right"}}>{c.name}</span>
              <div style={{flex:1,height:22,background:"#111825",borderRadius:4,position:"relative",overflow:"hidden"}}>
                <div style={{width:Math.min(100,Math.abs(plPct)*100)+"%",height:"100%",background:pl>=0?"#4caf50":"#ef5350",borderRadius:4,opacity:.6}}/>
                <span style={{position:"absolute",left:8,top:4,fontSize:9,fontWeight:700,color:"#fff"}}>{pl>=0?"+":""}{fmt(Math.abs(pl))} ({plPct>=0?"+":""}{pct(plPct)})</span>
              </div>
            </div>
          )})}
        </div>)}

      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
