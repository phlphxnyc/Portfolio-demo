function LineChart({data,height=200}){
  const [hover,setHover]=useState(null);
  if(!data||data.length<2)return null;
  const w=680,h=height,pad={t:15,r:15,b:25,l:60};
  const iw=w-pad.l-pad.r,ih=h-pad.t-pad.b;
  const yMin=Math.min(...data.map(d=>d.hh))*.97,yMax=Math.max(...data.map(d=>d.hh))*1.03;
  const xMin=data[0].ts,xMax=data[data.length-1].ts;
  const sx=v=>pad.l+((v-xMin)/(xMax-xMin))*iw;
  const sy=v=>pad.t+ih-((v-yMin)/(yMax-yMin))*ih;
  const pts=data.map(d=>sx(d.ts)+","+sy(d.hh)).join(" L");
  const area="M"+pts+"L"+sx(data[data.length-1].ts)+","+sy(yMin)+"L"+sx(data[0].ts)+","+sy(yMin)+"Z";
  const yT=Array.from({length:4},(_,i)=>yMin+(yMax-yMin)*(i/3));
  const hd=hover!==null&&hover<data.length?data[hover]:null;
  const handleMouse=e=>{const r=e.currentTarget.getBoundingClientRect();const x=(e.clientX-r.left)/r.width*w;const ratio=Math.max(0,Math.min(1,(x-pad.l)/iw));setHover(Math.round(ratio*(data.length-1)))};
  return <div><svg width="100%" height={h} viewBox={"0 0 "+w+" "+h} style={{display:"block",cursor:"crosshair"}} onMouseMove={handleMouse} onMouseLeave={()=>setHover(null)}>
    {yT.map((v,i)=><g key={i}><line x1={pad.l} x2={w-pad.r} y1={sy(v)} y2={sy(v)} stroke="#151d2e" strokeWidth={.5}/><text x={pad.l-6} y={sy(v)+4} fill="#3a4a5e" fontSize={8} textAnchor="end">{fmt(v)}</text></g>)}
    <path d={area} fill="#00e5ff" opacity={.06}/>
    <path d={"M"+pts} fill="none" stroke="#00e5ff" strokeWidth={2}/>
    {hd&&<g><line x1={sx(hd.ts)} x2={sx(hd.ts)} y1={pad.t} y2={h-pad.b} stroke="#00e5ff" strokeWidth={1} opacity={.5} strokeDasharray="3,3"/><circle cx={sx(hd.ts)} cy={sy(hd.hh)} r={4} fill="#00e5ff" stroke="#06080f" strokeWidth={2}/></g>}
  </svg>
  {hd&&<div style={{background:"#111825",border:"1px solid #182038",borderRadius:4,padding:"6px 12px",marginTop:2,display:"flex",gap:16,fontSize:10}}>
    <span style={{color:"#00e5ff",fontWeight:700}}>{new Date(hd.ts).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>
    <span style={{color:"#c8d0dc"}}>Household: <b style={{color:"#00e5ff"}}>{fmtF(hd.hh)}</b></span>
    <span style={{color:hd.hh>=data[0].hh?"#4caf50":"#ef5350"}}>{hd.hh>=data[0].hh?"+":""}{fmtF(hd.hh-data[0].hh)} ({hd.hh>=data[0].hh?"+":""}{pct((hd.hh-data[0].hh)/data[0].hh)})</span>
  </div>}</div>;
}

  const btn=a=>({padding:"5px 14px",background:a?"#00e5ff":"#0c1019",color:a?"#06080f":"#3a4a5e",border:"1px solid #151d2e",borderRadius:4,cursor:"pointer",fontFamily:"inherit",fontSize:10,fontWeight:700,letterSpacing:1});
  const inputSt={background:"#111825",color:"#c8d0dc",border:"1px solid #151d2e",borderRadius:4,padding:"6px 10px",fontFamily:"inherit",fontSize:11,width:"100%"};
  const insightColors={"Epiphany":"#7c4dff","Thesis Change":"#ff9100","Fundamental Shift":"#ef5350","Conviction Change":"#00e5ff","Market Observation":"#4caf50","Risk Alert":"#ff1744"};
  const priorityColors={"Urgent":"#ff1744","Important":"#ff9100","Note":"#448aff"};

  const tabs=[{id:"overview",l:"Overview"},{id:"factors",l:"Factor Exposure"},{id:"positions",l:"All Positions"},{id:"options",l:`Options (${options.length})`},{id:"watchlist",l:"Watchlist"},{id:"history",l:"History"},{id:"journal",l:"Trade Journal"},{id:"performance",l:"Performance"}];

  return(
    <div style={{background:"#06080f",color:"#c8d0dc",minHeight:"100vh",fontFamily:"'Courier New',monospace",fontSize:12}}>
      <div style={{background:"linear-gradient(90deg,#0a0f1a,#111a2e)",borderBottom:"1px solid #182038",padding:"14px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:16,fontWeight:900,letterSpacing:3,color:"#00e5ff"}}>PORTFOLIO COMMAND CENTER</span>
        <div style={{display:"flex",gap:16,alignItems:"center"}}>
          {[["TOTAL",fmtF(totalHH),"#00e5ff"],["HOLDINGS",fmt(totalMV),"#c8d0dc"],["CASH",fmt(totalCash),"#4caf50"],["CASH %",pct(totalCash/totalHH),"#4caf50"],["SOURCE","DEMO","#7c4dff"]].map(([l,v,c])=>(<div key={l} style={{textAlign:"right"}}><div style={{color:"#3a4a5e",fontSize:9,letterSpacing:1}}>{l}</div><div style={{fontSize:l==="TOTAL"?20:14,fontWeight:700,color:c}}>{v}</div></div>))}
        </div>
      </div>
      <div style={{display:"flex",borderBottom:"1px solid #151d2e",background:"#090d18",flexWrap:"wrap"}}>
        {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"10px 16px",background:tab===t.id?"#111825":"transparent",border:"none",borderBottom:tab===t.id?"2px solid #00e5ff":"2px solid transparent",color:tab===t.id?"#00e5ff":"#3a4a5e",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700,letterSpacing:1}}>{t.l}</button>)}
        <div style={{marginLeft:"auto",padding:"6px 12px",display:"flex",gap:6}}>
          <select value={ownF} onChange={e=>setOwnF(e.target.value)} style={{background:"#111825",color:"#c8d0dc",border:"1px solid #151d2e",borderRadius:4,padding:"4px 8px",fontFamily:"inherit",fontSize:10}}>
            <option value="All">All Owners</option><option value="Joint">Joint</option><option value="Owner A">Owner A</option><option value="Owner B">Owner B</option>
          </select>
          <select value={acctF} onChange={e=>setAcctF(e.target.value)} style={{background:"#111825",color:"#c8d0dc",border:"1px solid #151d2e",borderRadius:4,padding:"4px 8px",fontFamily:"inherit",fontSize:10}}>
            <option value="All">All Accounts</option>{Object.keys(AC).map(a=><option key={a} value={a}>{a}</option>)}
          </select>
        </div>
      </div>
      <div style={{padding:"16px 24px"}}>

        {/* ═══ OVERVIEW ═══ */}
        {tab==="overview"&&(<div>
          {/* ACTION REQUIRED */}
          {(()=>{const acts=[];P.filter(p=>p.exp).forEach(p=>{const d=Math.max(0,Math.floor((new Date(p.exp)-new Date())/864e5));if(d<=14)acts.push({sev:"critical",msg:"[URGENT] "+p.id+" expires in "+d+"d ("+p.acct+") — MV: "+fmt(p.mv),type:"expiry"});else if(d<=30)acts.push({sev:"warning",msg:"[WATCH] "+p.id+" expires in "+d+"d ("+p.acct+")",type:"expiry"})});const g=P.find(p=>p.id==="GOOGL");if(g&&g.mv>50000)acts.push({sev:"warning",msg:"GOOGL at "+fmt(g.mv)+" — trim plan still pending",type:"action"});if(totalCash/totalHH>.12)acts.push({sev:"info",msg:"Cash at "+pct(totalCash/totalHH)+" ("+fmt(totalCash)+") in money market ~4%",type:"cash"});INSIGHTS.filter(i=>i.priority==="Urgent").forEach(i=>acts.push({sev:"critical",msg:"INSIGHT: "+i.text.substring(0,80)+"...",type:"insight"}));if(!acts.length)return null;const sc2={critical:"#ff1744",warning:"#ff9100",info:"#448aff"};return <div style={{marginBottom:16}}><div style={{fontSize:10,color:"#ff9100",letterSpacing:1,fontWeight:700,marginBottom:8}}>ACTION REQUIRED ({acts.length})</div>{acts.slice(0,6).map((a,i)=><div key={i} style={{background:"#0e1525",borderLeft:"3px solid "+sc2[a.sev],padding:"8px 14px",marginBottom:3,borderRadius:"0 4px 4px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:"#c8d0dc",fontSize:11}}>{a.msg}</span><span style={{background:"#1a274433",color:"#3a4a5e",padding:"2px 6px",borderRadius:3,fontSize:8}}>{a.type}</span></div>)}</div>})()}
          {/* RETURN PERIODS */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(8,1fr)",gap:6,marginBottom:16}}>
            {retPeriods.map(r=><div key={r.l} style={{background:"#0e1525",border:"1px solid #182038",borderRadius:6,padding:"8px 10px",textAlign:"center"}}>
              <div style={{color:"#3a4a5e",fontSize:9,letterSpacing:1,marginBottom:2}}>{r.l}</div>
              <div style={{fontSize:14,fontWeight:800,color:r.chg>=0?"#4caf50":"#ef5350"}}>{r.chg>=0?"+":""}{pct(r.chgPct)}</div>
              <div style={{fontSize:9,color:r.chg>=0?"#4caf50":"#ef5350"}}>{r.chg>=0?"+":""}{fmt(Math.abs(r.chg))}</div>
            </div>)}
          </div>
          {/* ACCOUNT CARDS */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10,marginBottom:16}}>
            {Object.keys(AC).map(acct=>{const ap=P.filter(p=>p.acct===acct);const amv=ap.reduce((s,p)=>s+p.mv,0);const ac=CASH.find(c=>c.acct===acct)?.amt||0;const own=ap[0]?.own||"";return <div key={acct} style={{background:"#0e1525",border:"1px solid #182038",borderLeft:"3px solid "+AC[acct],borderRadius:"0 6px 6px 0",padding:12}}><div style={{fontSize:9,color:"#3a4a5e"}}>{own}</div><div style={{fontSize:13,fontWeight:800,color:AC[acct]}}>{acct}</div><div style={{fontSize:18,fontWeight:900,color:"#c8d0dc",margin:"4px 0"}}>{fmt(amv+ac)}</div><div style={{fontSize:10,color:"#5c6b7a"}}>{fmt(amv)} inv · {fmt(ac)} cash</div></div>})}
          </div>
          {/* CASH LEDGER */}
          <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:6}}>CASH BY ACCOUNT</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:6,marginBottom:16}}>
            {CASH.filter(c=>c.amt>0).map(c=><div key={c.acct} style={{background:"#0e1525",border:"1px solid #182038",borderRadius:6,padding:"6px 10px",textAlign:"center"}}><div style={{fontSize:9,color:"#3a4a5e"}}>{c.acct}</div><div style={{fontSize:13,fontWeight:800,color:"#4caf50"}}>{fmt(c.amt)}</div><div style={{fontSize:9,color:"#3a4a5e"}}>{pct(c.amt/totalHH)}</div></div>)}
            <div style={{background:"#0e1525",border:"1px solid #4caf5033",borderRadius:6,padding:"6px 10px",textAlign:"center"}}><div style={{fontSize:9,color:"#4caf50"}}>TOTAL</div><div style={{fontSize:13,fontWeight:800,color:"#4caf50"}}>{fmt(totalCash)}</div><div style={{fontSize:9,color:"#3a4a5e"}}>{pct(totalCash/totalHH)} ~4% MMF</div></div>
          </div>
          {/* FACTOR + RISK */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
            <div><div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:6}}>FACTOR EXPOSURE</div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{factorExp.slice(0,10).map(f=><div key={f.name} style={{background:"#0e1525",border:"1px solid #182038",borderRadius:4,padding:"4px 10px",display:"flex",alignItems:"center",gap:4}}><span style={{width:6,height:6,borderRadius:2,background:FC[f.name]||"#666"}}/><span style={{fontSize:10}}>{f.name}</span><span style={{fontSize:10,fontWeight:700,color:"#00e5ff"}}>{pct(f.pct)}</span></div>)}</div></div>
            <div><div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:6}}>RISK TIERS</div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{riskBreak.map(r=><div key={r.name} style={{background:"#0e1525",border:"1px solid #182038",borderRadius:4,padding:"4px 10px"}}><span style={{fontSize:10}}>{r.name}</span><span style={{fontSize:10,fontWeight:700,color:"#00e5ff",marginLeft:4}}>{pct(r.pct)}</span></div>)}</div></div>
          </div>
          {/* TOP POSITIONS */}
          <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:6}}>TOP CONSOLIDATED POSITIONS</div>
          {consolidated.slice(0,12).map(c=><div key={c.name} style={{background:"#0e1525",border:"1px solid #182038",borderRadius:6,padding:"8px 14px",marginBottom:3,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><span style={{fontWeight:800,fontSize:13,color:"#c8d0dc",marginRight:10}}>{c.name}</span><span style={{color:"#00e5ff",fontWeight:700}}>{fmtF(c.mv)}</span><span style={{color:"#3a4a5e",marginLeft:6}}>{pct(c.mv/totalHH)}</span></div><div><span style={{color:c.mv>=c.basis?"#4caf50":"#ef5350",fontSize:11}}>{c.mv>=c.basis?"+":""}{fmt(c.mv-c.basis)}</span><span style={{color:"#3a4a5e",marginLeft:6,fontSize:10}}>{c.accounts.size} acct{c.accounts.size>1?"s":""}</span></div></div>)}
        </div>)}

        {/* ═══ FACTOR EXPOSURE ═══ */}
        {tab==="factors"&&(<div>
          <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:12}}>WEIGHTED FACTOR EXPOSURE</div>
          {factorExp.map(f=><div key={f.name} style={{display:"flex",alignItems:"center",gap:12,marginBottom:6}}><span style={{width:120,fontSize:11,color:"#c8d0dc",textAlign:"right"}}>{f.name}</span><div style={{flex:1,height:24,background:"#111825",borderRadius:4,position:"relative",overflow:"hidden"}}><div style={{width:pct(f.pct),height:"100%",background:FC[f.name]||"#666",borderRadius:4,opacity:.7}}/><span style={{position:"absolute",left:8,top:5,fontSize:10,fontWeight:700,color:"#fff"}}>{pct(f.pct)} — {fmtF(f.val)}</span></div></div>)}
        </div>)}

        {/* ═══ ALL POSITIONS ═══ */}
        {tab==="positions"&&(<div>
          <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:8}}>ALL POSITIONS — {filtered.length}</div>
          <div style={{background:"#0e1525",border:"1px solid #182038",borderRadius:6,overflow:"hidden"}}>
            <div style={{display:"grid",gridTemplateColumns:"100px 80px 55px 50px 75px 75px 75px 75px 55px",padding:"8px 12px",background:"#0a0f1a",borderBottom:"1px solid #182038",fontSize:9,color:"#3a4a5e",letterSpacing:1,fontWeight:700}}><span>SYMBOL</span><span>ACCOUNT</span><span>TYPE</span><span>QTY</span><span>PRICE</span><span>BASIS</span><span>MV</span><span>P&L</span><span>RISK</span></div>
            {filtered.sort((a,b)=>b.mv-a.mv).map((p,i)=>{const pl=p.mv-p.basis;return <div key={p.id} onClick={()=>setExpandRow(expandRow===p.id?null:p.id)} style={{cursor:"pointer"}}>
              <div style={{display:"grid",gridTemplateColumns:"100px 80px 55px 50px 75px 75px 75px 75px 55px",padding:"8px 12px",borderBottom:"1px solid #111a28",background:i%2===0?"#0e1525":"#0c1220",fontSize:11}}>
                <span style={{fontWeight:700,color:AC[p.acct]||"#c8d0dc"}}>{p.id}</span><span style={{color:"#3a4a5e",fontSize:10}}>{p.acct}</span><span>{p.type}</span><span>{p.qty}</span><span>${p.price}</span><span style={{color:"#3a4a5e"}}>{fmt(p.basis)}</span><span style={{color:"#00e5ff"}}>{fmt(p.mv)}</span><span style={{color:pl>=0?"#4caf50":"#ef5350"}}>{pl>=0?"+":""}{fmt(Math.abs(pl))}</span><span style={{fontSize:9,color:"#5c6b7a"}}>{p.risk}</span>
              </div>
              {expandRow===p.id&&<div style={{background:"#111825",padding:"10px 16px",borderBottom:"1px solid #182038",display:"flex",gap:16,flexWrap:"wrap"}}>
                {Object.entries(p.factors||{}).map(([f,w])=><span key={f} style={{display:"flex",alignItems:"center",gap:4,fontSize:10}}><span style={{width:8,height:4,borderRadius:1,background:FC[f]||"#666"}}/>{f} {(w*100).toFixed(0)}%</span>)}
                {p.notes&&<span style={{color:"#ff9100",fontSize:10}}>{p.notes}</span>}
              </div>}
            </div>})}
          </div>
        </div>)}

        {/* ═══ OPTIONS ═══ */}
        {tab==="options"&&(<div>
          <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:8}}>OPTIONS — CLICK COLUMN TO SORT</div>
          <div style={{background:"#0e1525",border:"1px solid #182038",borderRadius:6,overflow:"hidden"}}>
            <div style={{display:"grid",gridTemplateColumns:"110px 80px 45px 55px 80px 55px 65px 60px 65px 65px 55px",padding:"8px 10px",background:"#0a0f1a",borderBottom:"1px solid #182038",fontSize:9,color:"#3a4a5e",letterSpacing:1,fontWeight:700}}>
              {[["id","SYMBOL"],["acct","ACCT"],["qty","QTY"],["strike","STRIKE"],["exp","EXPIRY"],["dte","DTE"],["costEa","COST/EA"],["price","PRICE"],["mv","MV"],["pl","P&L"],["plPct","P&L%"]].map(([k,l])=><span key={k} onClick={()=>sortO(k)} style={{cursor:"pointer",color:optSort.col===k?"#00e5ff":"#3a4a5e"}}>{l}{optSort.col===k?(optSort.dir>0?" ▲":" ▼"):""}</span>)}
            </div>
            {options.map((o,i)=>{const sc=o.dte<=14?"#ff1744":o.dte<=30?"#ff9100":o.dte<=60?"#ffd600":"#4caf50";return <div key={o.id} style={{display:"grid",gridTemplateColumns:"110px 80px 45px 55px 80px 55px 65px 60px 65px 65px 55px",padding:"7px 10px",borderBottom:"1px solid #111a28",background:o.dte<=14?"rgba(255,23,68,0.06)":i%2===0?"#0e1525":"#0c1220",fontSize:11}}>
              <span style={{fontWeight:700}}>{o.id}</span><span style={{color:"#3a4a5e",fontSize:10}}>{o.acct}</span><span>{o.qty}</span><span>${o.strike}</span><span>{o.exp}</span><span style={{color:sc,fontWeight:700}}>{o.dte}d</span><span style={{color:"#5c6b7a"}}>${o.costEa.toFixed(2)}</span><span style={{color:"#00e5ff"}}>${o.price}</span><span style={{color:"#00e5ff"}}>{fmt(o.mv)}</span><span style={{color:o.pl>=0?"#4caf50":"#ef5350"}}>{o.pl>=0?"+":""}{fmt(Math.abs(o.pl))}</span><span style={{color:o.plPct>=0?"#4caf50":"#ef5350",fontWeight:600}}>{(o.plPct*100).toFixed(0)}%</span>
            </div>})}
          </div>
        </div>)}

        {/* ═══ WATCHLIST ═══ */}
        {tab==="watchlist"&&(<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700}}>WATCHLIST — {wlItems.length} NAMES</div>
            <button onClick={()=>setShowWlForm(!showWlForm)} style={{...btn(true),background:showWlForm?"#ef5350":"#00e5ff"}}>{showWlForm?"CANCEL":"+ ADD TO WATCHLIST"}</button>
          </div>
          {showWlForm&&<div style={{background:"#0e1525",border:"1px solid #00e5ff33",borderRadius:8,padding:16,marginBottom:12}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:10}}>
              <div><div style={{color:"#3a4a5e",fontSize:9,marginBottom:4}}>SYMBOL</div><input value={newWl.sym} onChange={e=>setNewWl({...newWl,sym:e.target.value.toUpperCase()})} style={inputSt} placeholder="PLTR"/></div>
              <div><div style={{color:"#3a4a5e",fontSize:9,marginBottom:4}}>PRIORITY</div><select value={newWl.priority} onChange={e=>setNewWl({...newWl,priority:e.target.value})} style={inputSt}><option>HIGH</option><option>MEDIUM</option><option>LOW</option></select></div>
              <div><div style={{color:"#3a4a5e",fontSize:9,marginBottom:4}}>ACCOUNT</div><input value={newWl.acct} onChange={e=>setNewWl({...newWl,acct:e.target.value})} style={inputSt} placeholder="Taxable"/></div>
              <div><div style={{color:"#3a4a5e",fontSize:9,marginBottom:4}}>ENTRY RANGE</div><input value={newWl.range} onChange={e=>setNewWl({...newWl,range:e.target.value})} style={inputSt} placeholder="$70-75"/></div>
            </div>
            <div style={{marginBottom:10}}><div style={{color:"#3a4a5e",fontSize:9,marginBottom:4}}>THESIS</div><textarea value={newWl.thesis} onChange={e=>setNewWl({...newWl,thesis:e.target.value})} style={{...inputSt,height:50}} placeholder="Why?"/></div>
            <button onClick={()=>{if(newWl.sym){setWlItems([...wlItems,{...newWl,fw:{}}]);setNewWl({sym:"",thesis:"",range:"",priority:"HIGH",acct:"Taxable"});setShowWlForm(false)}}} style={{...btn(true),padding:"8px 24px"}}>ADD</button>
          </div>}
          {wlItems.map((w,i)=><div key={i} style={{background:"#0e1525",border:"1px solid #182038",borderRadius:6,padding:"10px 16px",marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><span style={{fontWeight:800,fontSize:14,color:"#00e5ff",marginRight:10}}>{w.sym}</span><span style={{color:"#c8d0dc",fontSize:11}}>{w.thesis}</span></div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{color:"#5c6b7a",fontSize:10}}>{w.range}</span><span style={{background:w.priority==="HIGH"?"#ff174433":w.priority==="MEDIUM"?"#ff910033":"#448aff33",color:w.priority==="HIGH"?"#ff1744":w.priority==="MEDIUM"?"#ff9100":"#448aff",padding:"2px 8px",borderRadius:3,fontSize:9,fontWeight:700}}>{w.priority}</span><span style={{color:"#3a4a5e",fontSize:10}}>{w.acct}</span></div>
          </div>)}
        </div>)}

        {/* ═══ HISTORY ═══ */}
        {tab==="history"&&(<div>
          <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:8}}>BALANCE OVER TIME — Hover for details</div>
          <div style={{background:"#0c1019",border:"1px solid #151d2e",borderRadius:8,padding:16}}><LineChart data={HIST} height={280}/></div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginTop:12}}>
            {[["Starting",fmtF(HIST[0]?.hh||0),"#3a4a5e"],["Current",fmtF(HIST[HIST.length-1]?.hh||0),"#00e5ff"],["$ P&L","+"+(fmtF((HIST[HIST.length-1]?.hh||0)-(HIST[0]?.hh||0))),"#4caf50"],["Return","+"+pct(((HIST[HIST.length-1]?.hh||0)-(HIST[0]?.hh||0))/(HIST[0]?.hh||1)),"#4caf50"]].map((c,i)=><div key={i} style={{background:"#0c1019",border:"1px solid #151d2e",borderRadius:6,padding:"10px 14px",textAlign:"center"}}><div style={{color:"#3a4a5e",fontSize:9,letterSpacing:1,marginBottom:3}}>{c[0]}</div><div style={{fontSize:16,fontWeight:800,color:c[2]}}>{c[1]}</div></div>)}
          </div>
        </div>)}

        {/* ═══ TRADE JOURNAL ═══ */}
        {tab==="journal"&&(<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{display:"flex",gap:6}}><button onClick={()=>setJournalView("trades")} style={btn(journalView==="trades")}>TRADES ({TRADES.length})</button><button onClick={()=>setJournalView("insights")} style={btn(journalView==="insights")}>INSIGHTS ({INSIGHTS.length})</button></div>
          </div>
          {journalView==="trades"&&TRADES.map(t=>{const isExp=expandTrade===t.id;return <div key={t.id} onClick={()=>setExpandTrade(isExp?null:t.id)} style={{background:isExp?"#111825":"#0e1525",border:"1px solid #182038",borderLeft:"3px solid "+(t.action.includes("BUY")?"#4caf50":"#ef5350"),borderRadius:"0 6px 6px 0",padding:"10px 14px",marginBottom:4,cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{color:"#3a4a5e",fontSize:10}}>{t.date}</span><span style={{background:t.action.includes("BUY")?"#4caf5033":"#ef535033",color:t.action.includes("BUY")?"#4caf50":"#ef5350",padding:"2px 8px",borderRadius:3,fontSize:9,fontWeight:700}}>{t.action}</span><span style={{fontWeight:800,color:"#c8d0dc",fontSize:13}}>{t.symbol}</span><span style={{color:"#5c6b7a"}}>{t.qty} @ ${t.price}</span></div><span style={{background:t.status==="OPEN"?"#4caf5033":"#3a4a5e33",color:t.status==="OPEN"?"#4caf50":"#3a4a5e",padding:"2px 6px",borderRadius:3,fontSize:8,fontWeight:700}}>{t.status}</span></div>
            <div style={{color:"#5c6b7a",fontSize:10,marginTop:4}}>{t.thesis}</div>
            {isExp&&<div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #182038",display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,fontSize:10}}><div><div style={{color:"#00e5ff",fontSize:9,letterSpacing:1,fontWeight:700,marginBottom:3}}>STRATEGY</div><div style={{color:"#c8d0dc"}}>{t.strategy||"—"}</div></div><div><div style={{color:"#ff9100",fontSize:9,letterSpacing:1,fontWeight:700,marginBottom:3}}>EXIT PLAN</div><div style={{color:"#c8d0dc"}}>{t.exitPlan||"—"}</div></div></div>}
          </div>})}
          {journalView==="insights"&&INSIGHTS.map(ins=>{const isExp=expandInsight===ins.id;return <div key={ins.id} onClick={()=>setExpandInsight(isExp?null:ins.id)} style={{background:isExp?"#111825":"#0e1525",border:"1px solid #182038",borderLeft:"3px solid "+(insightColors[ins.type]||"#3a4a5e"),borderRadius:"0 6px 6px 0",padding:"10px 14px",marginBottom:4,cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{color:"#3a4a5e",fontSize:10}}>{ins.date}</span><span style={{background:(insightColors[ins.type]||"#3a4a5e")+"33",color:insightColors[ins.type]||"#3a4a5e",padding:"2px 8px",borderRadius:3,fontSize:9,fontWeight:700}}>{ins.type}</span><span style={{fontWeight:700,color:"#c8d0dc"}}>{ins.symbols}</span></div><span style={{background:(priorityColors[ins.priority]||"#3a4a5e")+"33",color:priorityColors[ins.priority]||"#3a4a5e",padding:"2px 8px",borderRadius:3,fontSize:8,fontWeight:700}}>{ins.priority}</span></div>
            <div style={{color:"#c8d0dc",fontSize:11,marginTop:4,lineHeight:1.4}}>{ins.text}</div>
            {isExp&&ins.action&&<div style={{marginTop:8,paddingTop:8,borderTop:"1px solid #182038"}}><div style={{color:"#ff9100",fontSize:9,letterSpacing:1,fontWeight:700,marginBottom:3}}>ACTION</div><div style={{color:"#c8d0dc",fontSize:11}}>{ins.action}</div></div>}
          </div>})}
        </div>)}

        {/* ═══ PERFORMANCE ═══ */}
        {tab==="performance"&&(<div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
            {[["Total Invested",fmtF(totalBasis),"#3a4a5e"],["Current Value",fmtF(totalMV),"#00e5ff"],["Unrealized P&L",(totalMV-totalBasis>=0?"+":"")+fmtF(totalMV-totalBasis),totalMV>=totalBasis?"#4caf50":"#ef5350"],["Return %",pct((totalMV-totalBasis)/totalBasis),totalMV>=totalBasis?"#4caf50":"#ef5350"]].map((c,i)=><div key={i} style={{background:"#0e1525",border:"1px solid #182038",borderRadius:8,padding:"16px 20px",textAlign:"center"}}><div style={{color:"#3a4a5e",fontSize:9,letterSpacing:1,marginBottom:6}}>{c[0]}</div><div style={{fontSize:22,fontWeight:800,color:c[2]}}>{c[1]}</div></div>)}
          </div>
          <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginBottom:8}}>P&L BY POSITION</div>
          {consolidated.map(c=>{const pl=c.mv-c.basis;const plPct=c.basis>0?pl/c.basis:0;return <div key={c.name} style={{display:"flex",alignItems:"center",gap:12,marginBottom:4}}><span style={{width:60,fontSize:11,fontWeight:700,color:"#c8d0dc",textAlign:"right"}}>{c.name}</span><div style={{flex:1,height:22,background:"#111825",borderRadius:4,position:"relative",overflow:"hidden"}}><div style={{width:Math.min(100,Math.abs(plPct)*100)+"%",height:"100%",background:pl>=0?"#4caf50":"#ef5350",borderRadius:4,opacity:.6}}/><span style={{position:"absolute",left:8,top:4,fontSize:9,fontWeight:700,color:"#fff"}}>{pl>=0?"+":""}{fmt(Math.abs(pl))} ({plPct>=0?"+":""}{pct(plPct)})</span></div></div>})}
          <div style={{fontSize:10,color:"#3a4a5e",letterSpacing:1,fontWeight:700,marginTop:16,marginBottom:8}}>RETURN BY ACCOUNT</div>
          {Object.keys(AC).map(acct=>{const ap=P.filter(p=>p.acct===acct);const amv=ap.reduce((s,p)=>s+p.mv,0);const ab=ap.reduce((s,p)=>s+p.basis,0);const pl=amv-ab;const plPct=ab>0?pl/ab:0;return <div key={acct} style={{display:"flex",alignItems:"center",gap:12,marginBottom:6}}><span style={{width:80,fontSize:11,fontWeight:700,color:AC[acct],textAlign:"right"}}>{acct}</span><div style={{flex:1,height:24,background:"#111825",borderRadius:4,position:"relative",overflow:"hidden"}}><div style={{width:Math.min(100,Math.abs(plPct)*100)+"%",height:"100%",background:pl>=0?"#4caf50":"#ef5350",borderRadius:4,opacity:.6}}/><span style={{position:"absolute",left:8,top:5,fontSize:10,fontWeight:700,color:"#fff"}}>{pl>=0?"+":""}{fmt(Math.abs(pl))} ({plPct>=0?"+":""}{pct(plPct)})</span></div></div>})}
        </div>)}

      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
